      `adapter_paths` (dict or list of per-cell adapter paths, each
      verified under `hf_model_repo` via `list_repo_files`),
      `hf_model_path` (single model path), `wandb_run_path` /
      `wandb_run` (single run path), and `wandb_run_names` (dict or
