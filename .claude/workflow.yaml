# .claude/workflow.yaml — Single source of truth for /issue state machine.
#
# This file enumerates every status, every conceptual board "column"
# (which on the local-files substrate is a folder under tasks/),
# every gate, every halt criterion, every marker kind, and every step
# in the /issue lifecycle. Anything that would otherwise be duplicated
# across CLAUDE.md, SKILL.md, markers.md, and consumers like
# scripts/post_step_completed.py and src/.../orchestrate/resume.py is
# collapsed into this one file.
#
# Substrate: LOCAL FILES under tasks/<status>/<N>/. There is no GitHub
# issue and no project-board control plane. Status
# transitions are folder moves; markers are rows appended to
# tasks/<N>/events.jsonl by scripts/task.py.
#
# Pre-commit lint (scripts/workflow_lint.py) enforces:
#   - column references in statuses resolve to a real column row
#   - dotted references in CLAUDE.md / SKILL.md / markers.md of the form
#     `(see workflow.yaml § <key>)` resolve to a real key here
#   - every step's posts_marker resolves to a known marker kind
#   - every step's entry_status_label references a real status name
#
# Schema (src/research_workflow/workflow.py) treats most lists as
# optional / defaulting to empty, so partial edits stay valid while a
# section is in flight. The lint catches semantic drift.
#
# Bump `version` on breaking schema changes. The validator refuses
# unknown version numbers.

version: 1
name: eps-task-workflow
control_plane: local_files

identifiers:
  issue_command: "/issue <N>"
  issue_number_means: "the integer that names tasks/<status>/<N>/"
  legacy_github_issues: "historical evidence only"

substrate:
  tasks_directory: "tasks/<status>/<N>/"
  per_task_files:
    - "body.md (YAML frontmatter + markdown body)"
    - "events.jsonl (append-only epm:* markers)"
    - "comments.jsonl (mentor comments + Claude replies)"
    - "plans/v<K>.md (per-round plan revisions)"
    - "plans/plan.md (symlink to latest)"
    - "artifacts/ (figures, html artifacts, drafts)"
    - "original-body.md (snapshot before clean-result promotion)"
  registry: "tasks/REGISTRY.json (id -> current folder path)"
  single_writer: "scripts/task.py (flock + git commit per operation)"

# ──────────────────────────────────────────────────────────────────────
# Issue types. Substrate-independent classification of what kind of
# work a task represents. Restored verbatim from the GH-era yaml — the
# values control which downstream agent gets dispatched (experimenter
# vs implementer) and which subset of /issue steps fires.
# ──────────────────────────────────────────────────────────────────────
issue_types:
  - experiment
  - infra
  - batch
  - analysis
  - survey
  # Question-level campaign runner (task #586): one task pinned to ONE
  # docs/open_questions.md anchor; a dedicated session runs /campaign <N>
  # and files + spawns ordinary kind:experiment children via /issue.
  - campaign

# ──────────────────────────────────────────────────────────────────────
# Conceptual board "columns". On the GH-era project board these were
# real GraphQL ProjectV2 columns; on the local-files substrate the
# parent folder under tasks/ plays that role (e.g. tasks/proposed/N/
# means the task is conceptually in the "To do" column). We keep the
# GH-era column names as a stable conceptual grouping that downstream
# helpers (gh_project.py, tests) still reference, with descriptions
# explicitly pointing at the folder(s) each column represents on disk.
# Color field is a placeholder string for schema validation only — no
# UI consumes it under the local-files substrate.
# ──────────────────────────────────────────────────────────────────────
columns:
  - name: "To do"
    color: GRAY
    description: "Folders tasks/proposed/<N>/ and tasks/clarifying/<N>/ — task filed, awaiting clarifier."
  - name: "Planning"
    color: PURPLE
    description: "Folder tasks/planning/<N>/ — adversarial-planner running."
  - name: "Plan awaiting review"
    color: YELLOW
    description: "Folder tasks/plan_pending/<N>/ — plan drafted; user action required to advance."
  - name: "In flight"
    color: BLUE
    description: "Folders tasks/{approved,running,verifying,interpreting,reviewing}/<N>/ — automated lifecycle in progress."
  - name: "Blocked"
    color: RED
    description: "Folder tasks/blocked/<N>/ — aborted or stuck; awaiting user triage."
  - name: "Awaiting promotion"
    color: YELLOW
    description: "Folder tasks/awaiting_promotion/<N>/ — clean-result drafted; user action required to promote via task.py promote."
  - name: "Followups running"
    color: ORANGE
    description: "Folder tasks/followups_running/<N>/ — a same-issue follow-up round is executing on this task (tag followup-auto | followup-manual); legacy: parent complete with parent_id children still in flight."
  - name: "Useful"
    color: BLUE
    description: "Folder tasks/completed/<N>/ with frontmatter classification=useful — paper-relevant clean-result."
  - name: "Not useful"
    color: GRAY
    description: "Folder tasks/completed/<N>/ with frontmatter classification=not-useful — archive candidate."
  - name: "Done"
    color: GREEN
    description: "Folder tasks/completed/<N>/ — terminal: experiment finished + clean-result promoted, OR implementation shipped + reviewed."
  - name: "Archived"
    color: GRAY
    description: "Folder tasks/archived/<N>/ — closed long ago / no longer relevant. Sticky regardless of has_clean_result."
  - name: "Shared"
    color: GRAY
    description: "Folder tasks/shared/<N>/ — shared infra / utility tasks not tied to a single experiment."

# ──────────────────────────────────────────────────────────────────────
# status:* labels. Each status pins to one column above. Statuses are
# stored as folder names: status `awaiting_promotion` ⇔ folder
# `tasks/awaiting_promotion/<N>/`. The label_to_column() helper maps
# `status:<name>` → column.name for back-compat with gh_project.py
# consumers.
# ──────────────────────────────────────────────────────────────────────
statuses:
  - name: proposed
    column: "To do"
    description: "User has filed; clarifier hasn't run."
    next_action: clarify
    user_gated: false
  - name: clarifying
    column: "To do"
    description: "Clarifier asked questions; awaiting user answers in comments.jsonl."
    next_action: clarify
    user_gated: true
  - name: planning
    column: "Planning"
    description: "Adversarial-planner is running."
    next_action: plan
    user_gated: false
  - name: plan_pending
    column: "Plan awaiting review"
    description: "Plan posted; awaiting user approval (task.py set-status N approved)."
    next_action: approve
    user_gated: true
  - name: approved
    column: "In flight"
    description: "Plan approved; skill is creating worktree and dispatching the specialist."
    next_action: dispatch
    user_gated: false
  - name: awaiting_approval
    column: "Plan awaiting review"
    description: "Legacy alias for plan_pending; preserved for back-compat with older bodies."
    next_action: approve
    user_gated: true
  - name: queued
    column: "In flight"
    description: "Approved task awaiting an available pod or implementer slot."
    next_action: dispatch
    user_gated: false
  - name: implementing
    column: "In flight"
    description: "Implementer or experiment-implementer is writing code."
    next_action: implement
    user_gated: false
  - name: code_reviewing
    column: "In flight"
    description: "code-reviewer ensemble is reviewing the diff."
    next_action: review_code
    user_gated: false
  - name: testing
    column: "In flight"
    description: "Inline test-suite step (Step 9c, code-change paths only)."
    next_action: test
    user_gated: false
  - name: running
    column: "In flight"
    description: "experimenter is running the workload on a pod."
    next_action: run
    user_gated: false
  - name: verifying
    column: "In flight"
    description: "upload-verifier is checking that artifacts landed on HF Hub / WandB / git. (There is NO `uploading` status — the whole upload-verification phase runs at `verifying`; task.py rejects `uploading`.) The analyzer first pass (HOLD-marker mode) + methodology-writer may pre-compute in the background (Step 8 results-landed parallel spawn) — no epm:interpretation is published before upload-verification PASS."
    next_action: verify_uploads
    user_gated: false
  - name: interpreting
    column: "In flight"
    description: "analyzer + interpretation-critic + clean-result-critic loops are running."
    next_action: interpret
    user_gated: false
  - name: reviewing
    column: "In flight"
    description: "Final adversarial review pass (clean-result-critic Lens 7 absorbed the retired reviewer step)."
    next_action: review
    user_gated: false
  - name: under_review
    column: "In flight"
    description: "Legacy alias of reviewing; do not introduce new uses."
    next_action: review
    user_gated: false
  - name: awaiting_promotion
    column: "Awaiting promotion"
    description: "User action: promote clean-result via task.py promote <N> useful|not-useful."
    next_action: promote
    user_gated: true
  - name: followups_running
    column: "Followups running"
    description: "A same-issue follow-up round is executing on this task (tag followup-auto | followup-manual); legacy: parent complete with parent_id children still in flight."
    next_action: resume_followup_or_wait_for_children
    user_gated: false
  - name: shared
    column: "Shared"
    description: "Shared infra / utility task not tied to a single experiment."
    next_action: terminal
    user_gated: false
  - name: blocked
    column: "Blocked"
    description: "Aborted or stuck; awaiting user triage."
    next_action: triage
    user_gated: true
  - name: completed
    column: "Done"
    description: "Terminal: clean-result promoted OR code change shipped + reviewed."
    next_action: terminal
    user_gated: false
  - name: done_experiment
    column: "Done"
    description: "Legacy terminal alias used by older bodies; equivalent to completed."
    next_action: terminal
    user_gated: false
  - name: done_impl
    column: "Done"
    description: "Legacy terminal alias used by older bodies; equivalent to completed."
    next_action: terminal
    user_gated: false
  - name: failed
    column: "Blocked"
    description: "Workload crashed and could not be resumed; awaiting user triage."
    next_action: triage
    user_gated: true
  - name: cancelled
    column: "Archived"
    description: "User cancelled before completion."
    next_action: terminal
    user_gated: false
  - name: archived
    column: "Archived"
    description: "Closed long ago / no longer relevant; sticky regardless of has_clean_result."
    next_action: terminal
    user_gated: false

# ──────────────────────────────────────────────────────────────────────
# Canonical lifecycle order — the happy-path traversal an experiment
# follows from filing to completion. Aliases live in `status_aliases`
# below and are NOT part of this sequence.
# ──────────────────────────────────────────────────────────────────────
canonical_lifecycle:
  - proposed
  - clarifying
  - planning
  - plan_pending
  - approved
  - queued
  - implementing
  - code_reviewing
  - testing
  - running
  - verifying
  - interpreting
  - reviewing
  - awaiting_promotion
  - completed

status_aliases:
  under_review: reviewing
  awaiting_approval: plan_pending
  done_experiment: completed
  done_impl: completed

# ──────────────────────────────────────────────────────────────────────
# Priority labels. Schema-stub only: the local-files substrate does NOT
# carry "labels" — the equivalent for clean-result classification is the
# `classification` field in body.md frontmatter (useful / not-useful /
# pending). This block exists so workflow_lint's column-reference walk
# stays happy and so gh_project.py's legacy label_to_column() mapping
# still produces the columns its tests expect. NOT used by the local
# substrate at runtime.
# ──────────────────────────────────────────────────────────────────────
priority_labels:
  - name: clean-results:draft
    column: "Awaiting promotion"
    description: "Schema-stub only. Local substrate equivalent: set has_clean_result=true in body.md frontmatter while status remains awaiting_promotion."
  - name: clean-results:useful
    column: "Useful"
    description: "Schema-stub only. Local substrate equivalent: frontmatter classification=useful after task.py promote."
  - name: clean-results:not-useful
    column: "Not useful"
    description: "Schema-stub only. Local substrate equivalent: frontmatter classification=not-useful after task.py promote."

# ──────────────────────────────────────────────────────────────────────
# Clarification rules. The clarifier MUST ask targeted questions only;
# it MUST NOT add broad literature or methodological gates.
# ──────────────────────────────────────────────────────────────────────
clarification:
  status: clarifying
  required_points:
    - specific_hypothesis
    - expected_information_gain
    - result_that_changes_next_action_or_belief
    - missing_constraints_that_make_planning_invalid
  rules:
    - ask_few_targeted_questions
    - advance_to_planning_if_hypothesis_and_information_gain_are_clear
    - do_not_add_broad_literature_or_methodological_gates

# ──────────────────────────────────────────────────────────────────────
# Auto-continuation gates. Restored verbatim (with substrate
# substitutions) from the GH-era yaml. CLAUDE.md "Auto-continuation
# policy" enumerates these. Three categories:
#   - inline: block within a single /issue invocation via
#     AskUserQuestion. The skill pauses and resumes after the user
#     answers in the same session.
#   - park_and_wait: skill EXITs and waits for the user to run a
#     separate task.py command before re-invoking /issue <N>.
#   - conditional: only fires when explicitly opted into (TDD mode).
# ──────────────────────────────────────────────────────────────────────
gates:
  inline:
    - id: 1
      name: empty_body
      step: "0b/1"
      reason: "body.md is empty (cannot guess primary input)"
    - id: 2
      name: missing_type
      step: "0b/2"
      reason: "type field missing or contradictory in body.md frontmatter (wrong guess corrupts the Done column)"
    - id: 3
      name: clarifier_blocking
      step: "1"
      status: status:proposed
      reason: "clarifier blocking ambiguities (status:proposed)"
    - id: 4
      name: plan_approval
      step: "2c"
      status: status:plan_pending
      reason: "plan approval — user runs `uv run python scripts/task.py set-status <N> approved` (or replies `approve` in chat). EXCEPTION — autonomous sessions (EPM_AUTONOMOUS_SESSION=1, spawned via `spawn_session.py spawn-issue --auto`) AUTO-APPROVE a plan whose gpu_hours_total <= EPM_PLAN_AUTOAPPROVE_GPU_HOURS (default 100) and continue without pausing; they park at plan_pending (this gate) only when the estimate exceeds the cap or is missing/unparseable (fail-safe). Interactive sessions always ask."
    # id 5 (worktree_merge) RETIRED 2026-06-03: the worktree merge is now
    # automatic (no AskUserQuestion) at the terminal point — Step 9b for
    # experiments (awaiting_promotion), Step 10d for code paths. See the
    # worktree_merge_auto step below + SKILL.md Step 10d. Not a gate anymore.
    - id: 6
      name: experiment_goal
      step: "0c"
      reason: |
        Goal-of-experiment gate. When the body of a `kind: experiment`
        task lacks a populated frontmatter `goal:` field OR lacks a
        `## Goal` H2 block in body.md, /issue Step 0c raises
        `AskUserQuestion` asking the user for a one-sentence Goal,
        then runs `task.py set-goal <N> "<answer>" --by user` (which
        writes both frontmatter and body, plus an `epm:goal-updated v1`
        marker). `kind: analysis | infra | batch | survey` are exempt.
        The Goal is the canonical optimization target every downstream
        subagent (planner, critic, experiment-implementer, analyzer,
        clean-result-critic, interpretation-critic, follow-up-proposer)
        reads from body.md frontmatter. The PM session Mode 5 pre-spawn
        check is the primary enforcement point; Step 0c is the
        per-issue-session safety net.

        Step 0c-link (open-question linking) shares this gate window but
        is NOT always an ask: when the experiment matches an EXISTING
        open question it auto-links with no AskUserQuestion (stated as an
        `Assumption:`); the AskUserQuestion fires ONLY when no existing
        question fits and a NEW question stub must be drafted (a durable
        living-docs mutation). See SKILL.md Step 0c-link + the
        `epm:question-linked` marker (`mode=auto-match|user-confirmed-new`).
    - id: 10
      name: smoke_architecture
      step: "6d.0"
      reason: |
        Smoke/sweep architectural parity gate. Fires before any
        pod-provision + experimenter-dispatch action in Step 6. Refuses
        to dispatch when the implementer's `epm:smoke-architecture-check v1`
        verdict is `FAIL_NO_CANARY` (paths diverge without the planner's
        two-sentence justification + named canary cell). On
        FAIL_NO_CANARY, /issue bounces back to status:planning for a
        UNIFICATION re-architect (or, if unification is genuinely
        impossible, the planner re-drafts with the canary section).
        PASS_UNIFIED and PASS_CANARY both advance to Step 6a (pod
        provision). Rationale: task #397 rounds 9/10/10' burned three
        full implementer rounds on subprocess-vs-in-process divergence
        the smoke phase silently satisfied; the gate forces the
        divergence to be explicit at plan time.

        <!-- gate: gates.inline.smoke_architecture -->
    - id: 15
      name: concern_deferral_request
      step: "5c/5c-bis (code-review), 9a (interp), 9a-bis (clean-result)"
      reason: |
        Binding-concerns deferral gate. Fires per OPEN binding concern
        (severity=CONCERN — BLOCKERs cannot be user-deferred and never
        route here) that the orchestrator cannot or chooses not to
        address in an implementer round AFTER the
        `mechanical_contract_only_strip` rule has already stripped any
        marker-shape / smoke-run-missing blockers from the verdict.
        Layered ON TOP of main's PASS+CONCERNS auto-advance + mechanical
        strip — both keep operating untouched. Mechanical-only verdicts
        still strip and auto-advance; substantive concerns persisted to
        `concerns.jsonl` via `task.py raise-concern --severity CONCERN`
        survive the strip and park here.

        On fire, the skill raises `AskUserQuestion` proposing the
        deferral; on user agreement, runs
        `task.py defer-concern <N> --concern-id <id> --by user
        --rationale "..."` (rationale ≥40 chars, not a known boilerplate
        phrase). On user refusal, dispatches an implementer round
        targeting that concern. Multiple open concerns batch into ONE
        `AskUserQuestion` call with one option per concern_id + a
        free-text rationale box. See
        `.claude/skills/issue/SKILL.md` Step 5c / 5c-bis / 9a / 9a-bis
        "binding-concerns deferral" subroutines.

        <!-- gate: gates.inline.concern_deferral_request -->
  park_and_wait:
    - id: 7
      name: awaiting_promotion
      label: status:awaiting_promotion
      reason: |
        Clean-result promotion. After clean-result-critic PASS, the source task
        is parked at status:awaiting_promotion — its body is the polished
        clean-result write-up, and `runs.classification` (frontmatter) stays
        at `pending`. The user runs
        `uv run python scripts/task.py promote <N> useful|not-useful` when
        satisfied; re-invoking /issue <N> then advances into Step 10. /issue
        does NOT use AskUserQuestion here — it posts the dashboard link and
        exits cleanly. Awaiting promotion is user-only: no automation may
        flip `runs.classification` without explicit user invocation.
    - id: 16
      name: campaign_brief_approval
      label: status:approved
      reason: |
        Campaign brief approval (the human gate INTO a campaign — task
        #586). A `kind: campaign` task executes only from status
        `approved`: the user reviews the `## Campaign Brief` (question
        anchor, hypothesis set, initial experiment DAG, budget + stop
        criteria) and runs `uv run python scripts/task.py set-status <N>
        approved`. The /campaign skill (and `spawn_session.py
        spawn-campaign`) REFUSE to start from `proposed` — they exit with
        a one-line pointer to this gate, no AskUserQuestion. Once
        approved, the campaign session is fully autonomous within the
        brief's GPU-hour budget + limits (recorded in
        artifacts/campaign-state.json): it MAY auto-file and auto-spawn
        substantially-different child experiments via `/issue <child>
        --auto` — the user-approved 2026-06-10 exception to the
        "all automatic follow-up EXECUTION is same-issue" routing rule,
        scoped strictly to approved campaigns. Gates OUT are the daily
        `epm:campaign-digest` + the final report; per-child clean-result
        promotion stays user-only (gate id 7) but does NOT block the
        campaign's ingest (it reads the critic-gated body at
        awaiting_promotion).
  conditional:
    - id: 9
      name: experiment_goal_refine
      step: "1 (clarifier) or /adversarial-planner Phase 1 (planner)"
      condition: "clarifier OR planner surfaces a sharper Goal as part of normal work"
      reason: |
        Goal-refinement gate (conditional, opt-in). The clarifier (Step
        1) and planner (/adversarial-planner Phase 1) MAY surface a
        sharper Goal as part of their work; if either does, it raises
        `AskUserQuestion` proposing the new wording. On explicit user
        consent in the same turn, the agent runs
        `task.py set-goal <N> "<new>" --by clarifier|planner`, which
        emits a new `epm:goal-updated v1` marker recording the
        from/to/by/reason. Without explicit consent the Goal stays put.
        Critic / experiment-implementer / experimenter / analyzer /
        interpretation-critic / clean-result-critic / follow-up-proposer
        MUST NOT propose Goal changes — by the time they run, the Goal
        is contract.
    - id: 8
      name: tdd_gate
      step: "4b"
      condition: "plan body contains '### TDD: yes' OR user explicitly requested TDD"
      reason: |
        Implementer posts `epm:proposed-tests v1`, EXITs awaiting an
        `approve-tests` approval in the events.jsonl. Re-invoking /issue <N>
        after approval resumes Step 4b normally. (See `markers.md` and the
        implementer agent specs.)
    - id: 11
      name: whack_a_mole_pivot
      step: "5.bis(b) (post-code-review-PASS, pre-Step-6 pod-provision)"
      condition: |
        Fires when Fix #6's whack-a-mole detector triggers:
        - PRIMARY: 3 distinct `epm:new-bug-class v1` tag values across
          the 3 most recent non-excluded implementer rounds, OR
        - SECONDARY: 2 distinct tags across the 2 most recent
          non-excluded rounds AND at least 1
          `epm:compute-deviation v1` event in the trailing 5 rounds
          (N-4..N).
        EXCLUDES rounds whose implementer report contained
        `<!-- workflow-fix-candidate v1 -->` (those drive workflow-
        improver, not strategy-pivot consideration). "Consecutive"
        means consecutive across non-excluded rounds — when an
        excluded round sits between two tagged rounds, it is skipped
        and the two tagged rounds count as consecutive for the
        trigger.
      reason: |
        Two-option prompt: `continue-as-planned` (one-line rationale +
        cost of next round) vs `pivot-to-<X>` (one-line rationale +
        cost of the canonical alternative the implementer's report
        named). 2-option cap per CLAUDE.md "Push through bugs in
        recovery mode" + Fix #7 from the #397 post-mortem. Round
        counter does NOT reset on `continue-as-planned`; does NOT
        increment on `pivot-to-<X>` (strategy pivot is not a fresh
        review round). Post-mortem trigger: task #397 rounds 8/9/10
        (2026-05-27) — three distinct bug classes accumulated; user
        had to recognize the whack-a-mole pattern manually at round
        11 instead of the orchestrator surfacing it at round 10.

        <!-- gate: gates.conditional.whack_a_mole_pivot -->
    - id: 12
      name: compute_deviation_resolution
      step: "5.bis(a) (whack-a-mole detector position, post-code-review-PASS)"
      condition: |
        Fires only when pivot_criteria.compute_deviation_over_2x's
        auto-descope path fails: no descope dimension keeps projected
        ratio ≤ 1.5× while preserving statistical power per the
        planner's §9 stratification spec.
      reason: |
        Two-option prompt: `continue_as_is` (accept extra cost; quote
        the projected ratio inline) vs `accept_descope_to_<X>_with_caveats`
        (named caveats inline). 2-option cap per CLAUDE.md "No 4+ option
        menus" + Fix #7 from the #397 post-mortem. Post-mortem trigger:
        task #397 round 6 (2026-05-27) — projection was 3-4× plan §12
        but surfaced as "needs human eyeball" rather than a structural
        pivot, costing ~17h before the user noticed.

        <!-- gate: gates.conditional.compute_deviation_resolution -->
    - id: 13
      name: living_docs_update
      step: "completion hook (after auto-complete -> status completed)"
      condition: |
        Fires once per kind:experiment task after it reaches
        status:completed (the post-promotion completion hook). The
        living-docs-updater agent has posted `epm:living-docs-proposed v1`
        with a proposed diff against docs/open_questions.md (and
        docs/papers.md if touched). kind: analysis/infra/batch/survey are
        exempt (they carry no open-question link).
      reason: |
        Two-option prompt: `confirm` (apply the updater's proposed diff
        via `scripts/living_docs.py apply <N> <patch>` — atomic flock +
        single commit; then post `epm:living-docs-updated v1`) vs
        `reject` (skip; post `epm:living-docs-update-rejected v1` with the
        reason; the proposal parks for a future /weekly backstop
        re-synthesis). "Edit" is a refinement of `confirm`, NOT a third
        option: the user may hand-edit the proposed diff before it is
        applied, and the same `confirm` path commits the edited patch —
        this keeps the prompt a binary confirm/reject per CLAUDE.md "2-option
        escalation cap for new conditional gates". Every living-docs
        mutation is user-confirmed: the agent proposes, the user
        confirms/edits/rejects, nothing auto-applies. NON-BLOCKING on the
        experiment lifecycle — the task is already completed, so the
        proposal can park indefinitely (like awaiting_promotion) if the
        user is away; no status moves and no gate blocks completion.

        <!-- gate: gates.conditional.living_docs_update -->
    - id: 14
      name: fact_candidates
      step: "6d.4 (polling-loop terminal tick, on poll_pipeline.py status=gate)"
      condition: |
        Fires when poll_pipeline.py drains a pod-side sentinel file
        (/workspace/logs/issue-<N>-*.json) whose payload carries a
        non-empty `gate: "fact-candidates"` field — the on-pod driver
        has finished Phase 0 of a fact-teaching experiment, posted the
        ranked candidate table as `epm:fact-candidates v1`, and exited
        waiting on a user pick. Originated with task #407
        (run_experiment_407.py); reused by task #444 and any future
        fact-teaching task mirroring the same 8-phase argparse driver.
      reason: |
        The pod cannot raise AskUserQuestion (pod-side code never
        shells out to task.py per the branch-guard rule). The poller
        posts `epm:fact-candidates v1` from the VM; the orchestrator
        parks at this gate via AskUserQuestion listing each candidate
        `id` + one-sentence summary as an option. On user reply, the
        orchestrator posts `epm:fact-pick v1` with `id: <chosen_id>`
        in the note body; the user re-invokes `/issue <N>` and the
        driver's `--phase fact-pick` step materialises `fact_pick.json`
        on disk. The poller has ALREADY posted the candidate marker —
        the orchestrator MUST NOT re-post it (double-post is the
        failure mode this contract avoids). NON-BLOCKING on
        experiment-strategy correctness; the orchestrator parks
        cleanly with `epm:step-completed exit_kind=parked` and resumes
        the Step 6d.2 polling loop on the next /issue invocation.

        <!-- gate: gates.conditional.fact_candidates -->

# ──────────────────────────────────────────────────────────────────────
# STATE-TO-status:blocked criteria.
#
# PHILOSOPHY (revised 2026-05-22, per user directive): block ONLY when
# the orchestrator genuinely needs user input that no autonomous
# reasoning can supply. Cap/retry events should trigger a STRATEGY PIVOT
# (different design, different model, different scope), NOT an automatic
# block. **Continuing on your own is the default.** Reviewers reject
# PRs that block prematurely.
#
# Cross-referenced from CLAUDE.md "STATE-TO-blocked criteria".
# ──────────────────────────────────────────────────────────────────────
halt_criteria:
  - id: 1
    name: outside_worktree_writes
    description: |
      Assumption would silently delete or overwrite user files OUTSIDE
      the worktree (security boundary; irreversible).
  - id: 2
    name: api_contract_change
    description: |
      Assumption changes a public API contract (status name semantics,
      marker schema, agent file location, task.py subcommand name).
      Semantic-compatibility risk; the user owns the contract.
  - id: 3
    name: subagent_blocker_with_needs_user
    description: |
      Subagent (consistency-checker / code-reviewer / interpretation-critic /
      clean-result-critic) returns BLOCKER or FAIL with an EXPLICIT
      `needs-user` flag. A bare FAIL without `needs-user` is NOT a
      block trigger — the orchestrator pivots strategy and tries a
      different angle (see § pivot_criteria).
  - id: 4
    name: factual_question_only_user_knows
    description: |
      A choice required by the workflow depends on user-private knowledge
      (priority between tasks, taste-call on design, scope decisions
      between multiple valid paths) where no project memory / plan /
      codebase signal disambiguates. When in doubt, the bar to ask is
      HIGH — continue with a documented `Assumption: ...` instead unless
      the wrong choice has a meaningful cost the user cares about.

      Autonomous-mode carve-out (`EPM_AUTONOMOUS_SESSION=1`): in `--auto`
      sessions the taste / scope / design-preference / "which valid path?"
      sub-cases do NOT trigger this criterion — there is no human to
      escalate to, so the session picks the option with max
      info-gain-per-GPU-hour toward the task `## Goal` (tie-break:
      lower-cost / safer / record-correcting), posts `Decision: <X>`,
      and continues. The only autonomous residue of #4 is a fact the
      user UNIQUELY holds (account credential, external decision the
      user already promised to make, fact only the user can supply) AND
      that is NOT itself a taste / scope / design call. Real incident
      (2026-06-07): tasks #503/#504/#506/#509 parked overnight on
      "awaiting user decision on Phase 2 path forward" — the exact
      regression this carve-out closes. Authoritative prose:
      `.claude/skills/issue/SKILL.md` § Autonomous session behavior.
  - id: 5
    name: completion_audit_incomplete
    description: |
      Step 10 completion audit (`epm:completion-audit`) finds any numbered
      ask / acceptance criterion / explicit deliverable from the ORIGINAL
      task body that is unaddressed by the work artifacts.
  - id: 6
    name: concern_unresolved
    description: |
      A binding concern persisted in `concerns.jsonl` (severity=CONCERN
      or BLOCKER, latest event `raised` or `verified-open`) remains OPEN
      after the orchestrator has exhausted autonomous options:
      implementer round(s) failed to address it AND
      (for CONCERN) user refused deferral via gate id=15
      (`concern_deferral_request`), OR
      (for BLOCKER) deferral is forbidden by the protocol AND no
      pivot in pivot_criteria resolves it.
      The orchestrator then posts `epm:failure v1` with `failure_class:
      code` referencing the concern_id, sets status:blocked, and exits.
      Re-invocation of `/issue <N>` after the user takes action (runs
      `task.py address-concern` manually, runs `task.py defer-concern
      --by user`, or sets a different next step) resumes from the
      Step 0 router. NOT triggered by NIT concerns.

# ──────────────────────────────────────────────────────────────────────
# Pivot criteria — what to do INSTEAD of blocking on cap/retry events.
# The orchestrator MUST attempt a strategy pivot before considering
# `status:blocked` on any of these.
# ──────────────────────────────────────────────────────────────────────
pivot_criteria:
  - trigger: code_review_ensemble_cap_3
    pivot_action: |
      After 3 implementer-round FAILs on the same strategic approach,
      re-invoke `/adversarial-planner` with an explicit pivot scope:
      "the implementation strategy isn't working — propose a
      fundamentally different design (drop offending component / swap
      model / change architectural approach)." Treat the resulting plan
      revision as round 1 of a NEW implementer cycle (cap-3 resets).
      Block only after ~3 such pivots have all failed.
  - trigger: infra_respawn_cap_3
    pivot_action: |
      After 3 experimenter respawns on the same pod intent, try a
      different pod intent (e.g., `ft-7b` → `lora-7b`, single-GPU →
      multi-GPU), a different image, or a different GPU type. Block
      only if pod-side resource constraints (RunPod supply, quota)
      prevent ANY viable provisioning.
  - trigger: model_refusal_cascade
    pivot_action: |
      When a model (Sonnet, GPT, etc.) refuses a needed task across
      multiple rounds (e.g., crisis-roleplay, jailbreak-impersonation),
      pivot via project-memory conventions: reframe the prompt
      (category labels, 3rd-person narrator), drop the offending
      domain/condition, or swap the model. Block only after ~3 pivots
      across the reframe/drop/swap axis have all failed.
  - trigger: interpretation_critic_cap_3
    pivot_action: |
      After 3 analyzer ↔ interpretation-critic rounds, advance regardless
      with residual debt surfaced in `comments.jsonl`. Existing single-
      critic policy. Do NOT block.
  - trigger: clean_result_critic_cap_3
    pivot_action: |
      After 3 analyzer ↔ clean-result-critic rounds, advance regardless
      with residual structural / register debt surfaced in
      `comments.jsonl`. Do NOT block.
  - trigger: compute_deviation_over_2x
    pivot_action: |
      Wall-time projection for any compute-bound component (from the
      planner's §9 per-component compute-projection table) exceeds 2×
      the row's `planned_wall_h`. Computed at implementer-report-time
      from the resolved per-cell parameters in the dispatcher.

      Auto-action: attempt auto-descope to the largest sub-grid keeping
      projected ratio ≤ 1.5× AND preserving statistical power per the
      planner's §9 stratification spec. Descope dimensions in priority
      order: seeds (drop from N to floor(N/2) if pre-registered seeds
      ≥ 4), framings (drop to single framing if pre-registered framings
      ≥ 3), cells-per-stratum (drop within-stratum cells if
      stratification allows). On success, post `epm:compute-deviation v1`
      with `action: auto_descope_to_<spec>` and continue.

      Escalation: when no descope keeps ratio ≤ 1.5× while preserving
      statistical power, surface
      gates.conditional.compute_deviation_resolution (id=12) with two
      options: `continue_as_is` (accept extra cost) vs
      `accept_descope_to_<X>_with_caveats` (descope drops below
      planner's §9 min-N-for-power; named caveats inline). Post-mortem
      trigger: task #397 round 6 (2026-05-27).
  - trigger: plan_contradiction_replan
    pivot_action: |
      Fires when a subagent (`experiment-implementer`, `code-reviewer`,
      `critic`, `interpretation-critic`, or any reviewer in the loop)
      reports that the PLAN ITSELF is the defect — internally contradictory
      success / kill criteria, a jointly-unsatisfiable gate set (e.g. two
      kill-gates demand opposite signs on the same measurement at the same
      cell), or an explicit "needs plan amendment / cannot pick a science
      direction" verdict. The signal is recipe-agnostic: it is NOT a bug
      in code, NOT a valid experimental fork, and NOT a recoverable
      preflight/infra hiccup. Detection cues in the subagent's report:
      phrases like "needs plan amendment", "internally contradictory",
      "gate set is jointly unsatisfiable", "cannot pick a science
      direction", or a Statistics & Measurement lens REVISE citing
      decision-gate coherence (critic.md / codex-critic.md).

      Pivot action (the ONLY legitimate response): `task.py set-status
      <N> planning` + re-invoke `/adversarial-planner` with explicit
      pivot scope naming the contradiction verbatim — for example
      "Gate 3 requires probe X >= +0.2 nat AND Gate 4 requires the same
      probe at the same cell <= -0.2 nat; redesign the gate set to be
      jointly satisfiable or drop to a single necessary kill-criterion."
      Treat the revised plan as a fresh implementer cycle (cap-3 resets).
      Count this as a strategy pivot for the cap-3-pivots-before-block
      rule (track via the existing `epm:strategy-pivot v<n>` marker
      convention; do NOT introduce a new marker). Block only after ~3
      re-plans fail to yield a satisfiable design AND no further
      autonomous angle exists (halt_criteria id=3 with explicit
      `needs-user` from the planner, or id=6 if a binding concern
      persists).

      Forbidden anti-patterns (the regressions this entry closes):
      (a) descoping a hyperparameter / recipe (lr, LoRA rank, row
      count, epoch count) to dodge the contradiction — that papers over
      a plan bug with a recipe knob and lands in a two-sided dead-end
      where neither attempt resolves the underlying gate conflict;
      (b) silently picking among the subagent's paper-over options as
      if it were a valid experimental fork (autonomous mode's
      max-info-gain pick applies to VALID forks, not to "the plan is
      self-defeating, pick a workaround"); (c) parking for the user in
      autonomous mode (`EPM_AUTONOMOUS_SESSION=1`) — there is no human
      to escalate to; re-plan in the same session.

      Post-mortem trigger: task #488 round 10 (2026-06-08). An
      autonomous session treated an `experiment-implementer` BLOCKED
      verdict ("the gate set is internally contradictory; I cannot pick
      a science direction") as a valid fork and descoped the recipe
      (lr 2e-6→1e-6, r 16→8, rows 150→75), then descoped further on
      the null and concluded "recipe family exhausted" — burning hours
      on a plan bug. The companion edits that prevent the contradiction
      from being shipped in the first place are
      `critic.md` + `codex-critic.md` Statistics & Measurement lens
      item 3 (decision-gate coherence, e902ef37c) and `planner.md` §7
      gate-set minimality + joint-satisfiability self-check (c183114c7);
      this entry closes the loop on the execution side when a
      contradictory plan slips through anyway.

# ──────────────────────────────────────────────────────────────────────
# Subagent halt verdicts. Restored from the GH-era yaml with substrate
# substitution (markers post to events.jsonl, not GitHub comments).
# CLAUDE.md "Subagent halt conditions" cross-references this table.
# ──────────────────────────────────────────────────────────────────────
subagent_halt_conditions:
  - subagent: consistency-checker
    verdict: BLOCKER
    action: "Step 2c writes BLOCKER to tasks/<status>/<N>/plans/v<K>.md, awaits user reply in comments.jsonl"
  - subagent: code-reviewer-ensemble
    verdict: "FAIL after reconcile (or FAIL+FAIL union)"
    action: |
      Ensemble of `code-reviewer` (Claude) + `codex-code-reviewer` (Codex
      gpt-5.5). PASS+PASS proceeds. FAIL+FAIL with overlapping blockers
      bounces; with disjoint blockers, union the blockers (one round).
      PASS+FAIL dispatches `reconciler` (marker mode); reconciler verdict
      binds. On any effective FAIL, bounces to implementer up to 3 rounds
      per reviewer (reconcile rounds free); on 4th ensemble FAIL, the
      default is a STRATEGY PIVOT (see § pivot_criteria.code_review_ensemble_cap_3)
      — re-invoke /adversarial-planner with explicit pivot scope and
      treat the revised plan as a fresh implementer cycle (cap-3 resets).
      Block only after ~3 such pivots have all FAILed AND no further
      autonomous angle exists.
  - subagent: critic-ensemble
    verdict: "REVISE/REJECT after per-lens reconcile (worst-wins cross-lens)"
    action: |
      /adversarial-planner Phase 2 ensemble: 3 lenses × 2 reviewers per
      round. Per-lens: APPROVE+APPROVE proceeds; REVISE+REVISE or
      REJECT+REJECT bounces; APPROVE vs REVISE/REJECT dispatches
      `reconciler` (IN-CONTEXT mode, no events.jsonl marker). Cross-lens:
      worst verdict wins. On REVISE/REJECT, bounces to planner up to 3
      rounds (reconcile rounds free); on 4th, the default is a strategy
      pivot (drop offending condition / swap eval design / change scope)
      and another planner cycle (cap-3 resets). Block only when the
      pivot space is exhausted.
  - subagent: interpretation-critic-ensemble
    verdict: "REVISE after reconcile (or REVISE+REVISE)"
    action: |
      Ensemble of `interpretation-critic` (Claude) +
      `codex-interpretation-critic` (Codex gpt-5.5). PASS+PASS proceeds.
      REVISE+REVISE bounces (concatenate + dedup findings). PASS+REVISE
      dispatches `reconciler` (marker mode). On REVISE, bounces to
      analyzer up to 3 rounds per reviewer; on 4th, advance regardless
      and surface residual debt to comments.jsonl (existing single-critic
      policy).
  - subagent: clean-result-critic-ensemble
    verdict: "REVISE after reconcile (or REVISE+REVISE)"
    action: |
      Final adversarial gate before status:awaiting_promotion (as of
      2026-05-13 — absorbed the retired reviewer step). Ensemble of
      `clean-result-critic` (Claude) + `codex-clean-result-critic`
      (Codex gpt-5.5) running 11 lenses including Lens 7
      (statistical-framing rule). PASS+PASS / PASS+CONCERNS advances.
      Disagreement dispatches `reconciler` (marker mode). On REVISE,
      bounces to analyzer up to 3 rounds; on 4th, advance regardless
      and surface residual structural / register debt to comments.jsonl.
  - subagent: clean-result-critic
    verdict: REVISE
    action: "Bounces to analyzer up to 3 rounds; on 4th REVISE, advance regardless and surface residual structural / register debt to comments.jsonl"
  - subagent: interpretation-critic
    verdict: FATAL
    action: "Bounces to analyzer up to 3 rounds; on 4th FATAL, status:blocked"
  - subagent: upload-verifier
    verdict: FAIL
    action: |
      status:verifying does not advance to interpretation. (The analyzer
      may have pre-computed a HELD first pass in the background — Step 8
      results-landed parallel spawn — but it stays unpublished until
      PASS; on gap-fill PASS the orchestrator re-spawns the analyzer
      only if the uploader changed an analysis input.)
      Branch by blocker tag in the verdict body:
      - blocker `primary-deliverable-missing` (Step 2.7 completeness
        gate, #519): Step 8 KEEPS THE POD ALIVE (do NOT terminate) and
        AUTO-RECOVERS by flipping status back to `running` and
        re-dispatching the experimenter to re-drive the missing phase
        on the still-alive pod; the /issue skill stays autonomous.
        Only the generic `pivot_criteria` cap-3 path (~3 fundamentally
        different strategies all FAILed AND no autonomous angle remains)
        routes to status:blocked for this failure class.
      - any other blocker: uploader (re)runs and verifier re-posts a
        fresh epm:upload-verification v<n>; standard 3-round cap
        applies.

# ──────────────────────────────────────────────────────────────────────
# Codex ensemble review. For each doubled review step, a Claude reviewer
# AND a Codex twin run in parallel; PASS/FAIL disagreement dispatches the
# `reconciler` agent for a binding tie-break. Round cap is per-reviewer
# (not per-ensemble); reconcile rounds don't count. Schema validated by
# `EnsembleReview` in `src/research_workflow/workflow.py`.
#
# The `reviewer_pairs` block (below this one) is the higher-level
# config used by /issue's review-loop driver. `ensemble_review` is the
# detailed per-step contract the codex-* agents read. The two are
# orthogonal: `reviewer_pairs.pairs.*.markers` MUST exist in the
# `markers` list, and `ensemble_review.doubled_steps[*].reconcile_marker`
# (mode=marker) MUST also exist in the `markers` list.
# ──────────────────────────────────────────────────────────────────────
ensemble_review:
  doubled_steps:
    - role: code-reviewer
      step: "5"
      claude_agent: code-reviewer
      codex_agent: codex-code-reviewer
      codex_model: gpt-5.5
      codex_runtime: companion-task
      verdict_field: "Verdict"
      pass_values: [PASS, CONCERNS]
      fail_values: [FAIL]
      reconcile_marker: "epm:review-reconcile"
      reconcile_mode: marker
    - role: critic
      step: "2 (adversarial-planner Phase 2)"
      claude_agent: critic
      codex_agent: codex-critic
      codex_model: gpt-5.5
      codex_runtime: companion-task
      verdict_field: "Rating"
      pass_values: [APPROVE]
      fail_values: [REVISE, REJECT]
      reconcile_marker: "epm:review-reconcile"  # in-context: printed to stdout, not posted
      reconcile_mode: in-context
      lenses: [methodology, statistics, alternatives]
      notes: |
        Phase 2 runs 6 critics per round (3 lenses × 2 reviewers). Per-lens
        ensemble decision: agree → use that verdict; disagree → spawn
        reconciler in IN-CONTEXT mode (no events.jsonl marker; reconciler
        prints verdict to stdout for the manager). Cross-lens merge:
        worst-wins across the 3 post-reconciliation lens verdicts. Codex
        twin no-show on a lens → fall back to single-Claude-critic for
        that lens this round. The consistency-checker (NOT ensembled)
        rides the same round-1 spawn batch when /issue invokes the skill;
        its BLOCK findings union with the merged critique into ONE
        Phase 3 revise round (/issue Step 2b owns its verdict semantics).
    - role: interpretation-critic
      step: "9a"
      claude_agent: interpretation-critic
      codex_agent: codex-interpretation-critic
      codex_model: gpt-5.5
      codex_runtime: companion-task
      verdict_field: "Verdict"
      pass_values: [PASS]
      fail_values: [REVISE]
      reconcile_marker: "epm:review-reconcile"
      reconcile_mode: marker
      notes: |
        Both reviewers run all 7 lenses (lens 6 plot-prose match works on
        both — Codex multimodal verified 2026-05-10). Codex twin no-show
        falls back to single-Claude-critic for that round. Round cap 3 per
        reviewer; reconcile rounds free.
    - role: clean-result-critic
      step: "9a-bis"
      claude_agent: clean-result-critic
      codex_agent: codex-clean-result-critic
      codex_model: gpt-5.5
      codex_runtime: companion-task
      verdict_field: "Verdict"
      pass_values: [PASS, CONCERNS]
      fail_values: [REVISE]
      reconcile_marker: "epm:review-reconcile"
      reconcile_mode: marker
      notes: |
        Final adversarial gate before status:awaiting_promotion (as of
        2026-05-13 — absorbed the retired reviewer step's statistical-framing
        rule as Lens 7). 11 lenses total: title, TL;DR, Summary structure +
        register, Details per-section discipline, captions, heading-as-toggle,
        body-discipline anti-patterns, Source issues conditional H2,
        issue-link form, verifier sanity (verify_task_body.py),
        statistical-framing rule.
  not_doubled:
    - upload-verifier      # mechanical artifact checklist, no LLM-judgment value
    - consistency-checker  # mechanical structure check
  round_cap_per_reviewer: 3
  reconcile_invocations_count_toward_cap: false
  union_rule: |
    On FAIL+FAIL with disjoint blocker sets, the orchestrator unions the
    blockers and treats it as ONE round (no reconciler dispatch). The
    implementer must address all blockers from both reviewers.
  agree_rule: |
    On PASS+PASS or PASS+CONCERNS, no reconciler dispatch.

    CONCERNS bullets that appear in the reviewer's verdict body but are
    NOT also persisted to `concerns.jsonl` via
    `task.py raise-concern --severity CONCERN` (or BLOCKER) remain
    opportunistic suggestions and do NOT block — the historical contract
    is preserved. Reviewers may continue to surface advisory notes
    without binding them.

    Substantive concerns the reviewer chooses to BIND must be persisted
    by calling `task.py raise-concern <N> --concern-id <kebab-id>
    --severity CONCERN|BLOCKER --summary <80c> --by <reviewer> --round <n>`.
    Persisted binding concerns survive auto-advance even on a PASS-class
    verdict: AFTER the `mechanical_contract_only_strip` rule has stripped
    any marker-shape / smoke-run-missing FAIL blockers, the orchestrator
    reads `task.py list-concerns <N> --open-only --json`. If any open
    concern at severity CONCERN or BLOCKER remains, the orchestrator
    routes — per concern_id — to either an implementer round (auto-fix
    + `task.py address-concern`) or the `concern_deferral_request` gate
    (id=15) for CONCERN-tier user-deferral. BLOCKERs cannot route to the
    deferral gate; the orchestrator must address or pivot strategy. NIT
    concerns surface as informational and never block. See
    § concerns_protocol for the severity tier mapping and the reviewer
    round protocol (every reviewer reads
    `task.py list-concerns <N> --open-only --json` at round start and
    inherits cross-stage concerns).
  mechanical_contract_only_strip: |
    Applies to the code-reviewer step only. A FAIL is *mechanical-contract-
    only* when its `**Blocker tags:**` line (code-reviewer Step 7 template) is
    a non-empty subset of {`marker-shape` (Step 0.5), `smoke-run-missing`
    (Step 0.6)} and does NOT contain `substantive`. The `**Blocker tags:**`
    line is the orchestrator's parse target (legacy verdicts without it fall
    back to Critical-section prose). BEFORE applying the
    union_rule / disagreement rule, the orchestrator mechanically verifies
    the highest-version implementer marker in CANONICAL task state
    (`task.py view <N>` — main-branch events.jsonl, NOT a stale worktree copy
    a reviewer may have read; a FAIL on "marker missing" from a stale-worktree
    read is the most common false absence). No LLM judgment — structural
    presence only: marker-shape requires all four H3 sections (a)–(d) with
    non-empty content plus a fenced command in (c); smoke-run-missing
    requires a `## Smoke run` section with a command, exit code 0, and an
    artifact digest. If the artifact is genuinely absent/non-conforming, the
    gate stands. If it is present + conforming, the orchestrator STRIPS the
    mechanical blocker from that reviewer's effective set and re-applies the
    ensemble rule to the remaining substantive blockers (no substantive
    blockers left → PASS; else normal FAIL/union/reconcile). Closes the
    gate-hopping failure mode where a reviewer FAILs on the *presentation* of
    present evidence (round 1 marker shape, round 2 smoke digest) without ever
    reviewing the diff. The strip does NOT increment the round counter. The
    reviewer-side defenses (no standalone cosmetic FAIL, no short-circuit of
    the diff) live in code-reviewer.md Steps 0.5/0.6/0.7 and are inlined into
    codex-code-reviewer.md; this strip is the orchestrator-side backstop.
    Skill ref: SKILL.md Step 5c-bis.
  reconciler_authority: |
    Binary verdict only (PASS or FAIL / APPROVE or REVISE). May NOT add
    new findings beyond what either reviewer raised — only adjudicates
    existing ones. Side observations go in the marker's "Observed but
    not raised" section and do not affect the verdict. See
    `.claude/agents/reconciler.md`.

# ──────────────────────────────────────────────────────────────────────
# Binding concerns protocol. Adopted 2026-05-31, composed on top of
# main's existing PASS+CONCERNS auto-advance + mechanical-contract-strip
# anti-gate-hopping policy (not a replacement of either).
#
# Two layers operating on different verdict classes:
#
# 1. Main's `mechanical_contract_only_strip` (above) handles FAILs whose
#    every blocker is mechanical (marker-shape, smoke-run-missing). It
#    strips them and re-applies the ensemble rule, preserving the
#    anti-gate-hopping property. UNCHANGED.
#
# 2. Binding-concerns (this protocol) handles SUBSTANTIVE concerns the
#    reviewer chose to persist by calling
#    `task.py raise-concern --severity CONCERN|BLOCKER`. These survive
#    a PASS-class verdict and gate auto-advance after the strip has run
#    — every advance step (code-review, interp, clean-result) consults
#    `task.py list-concerns <N> --open-only --json` before flipping
#    status forward.
#
# The two policies compose because they read different signals
# (verdict-body blocker tags vs concerns.jsonl), and neither weakens
# the other. CONCERNS-as-verdict remains a PASS-class verdict for the
# purposes of the ensemble decision; only persisted binding concerns
# block.
#
# Library + CLI: see `src/research_workflow/task_workflow.py` §
# "Binding concerns" and `scripts/task.py` raise-concern /
# address-concern / defer-concern / list-concerns subcommands.
# ──────────────────────────────────────────────────────────────────────
concerns_protocol:
  severity_tiers:
    - tier: BLOCKER
      maps_to_reviewer_severity: Critical
      can_user_defer: false
      blocks_advance: true
      description: |
        Strict gate. Orchestrator MUST address (dispatch implementer →
        `task.py address-concern`) or pivot strategy. Cannot be
        user-deferred; cannot be auto-advanced past. `task.py
        defer-concern` raises ValueError on attempt — sole exception:
        the reconciler's binding severity-downgrade via `--by
        reconciler` (see § reconciler_special_case). Unaddressed after
        autonomous options exhausted → halt_criteria id=6
        (concern_unresolved).
    - tier: CONCERN
      maps_to_reviewer_severity: Major
      can_user_defer: true
      blocks_advance: true
      description: |
        Binding concern. Survives PASS+CONCERNS auto-advance via the
        post-strip concerns.jsonl check (see § agree_rule). Orchestrator
        either fixes (implementer round + `task.py address-concern`) OR
        raises gate id=15 (`concern_deferral_request`) for explicit user
        deferral via `task.py defer-concern --by user`. Rationale must
        be ≥40 chars and not match a known boilerplate phrase. User
        refusal of deferral + autonomous options exhausted →
        halt_criteria id=6 (concern_unresolved).
    - tier: NIT
      maps_to_reviewer_severity: Minor
      can_user_defer: true
      blocks_advance: false
      description: |
        Opportunistic suggestion. Does NOT block advance. Surfaced to
        implementer; addressing is optional. No deferral required.
  reviewer_guidance: |
    Reviewers MUST only persist (via `task.py raise-concern`) what they
    actually want addressed before advance. Verdict-body bullets that
    are NOT persisted to concerns.jsonl remain opportunistic suggestions
    (the historical PASS+CONCERNS auto-advance contract holds for them).
    Calibration: would you block merge / promotion over this? If yes,
    persist as CONCERN. If it corrupts data or invalidates the
    experiment design, persist as BLOCKER. Otherwise leave as NIT or
    advisory verdict-body text.
  concern_id_format: "^[a-z0-9][a-z0-9-]{1,79}$"  # stable kebab-case
  summary_cap: |
    `--summary` is HARD-CAPPED at 200 chars — task.py raises ValueError
    above it (5 reviewer crashes on 2026-06-10 alone: 238-410-char
    summaries). Compose the summary as one tight sentence and move all
    detail to `--evidence`. The same cap applies to `address-concern`
    carried summaries.
  concern_id_examples:
    - probe-position-undefined
    - missing-mlm-control
    - n2-seeds-uninterpretable
    - trigger-conditional-contrast-missing
  storage:
    file: "tasks/<status>/<N>/concerns.jsonl"
    shape: append-only JSON Lines
    persists_across_status_moves: true   # carried by `git mv` of the task folder
    mirrors_to_events_jsonl: true        # thin breadcrumb: epm:concern-<event> v1
  reconciler_special_case: |
    The reconciler agent's primary authority is verdict adjudication
    (PASS / CONCERNS / BLOCKER / FAIL — or APPROVE / REVISE / REJECT for
    /adversarial-planner Phase 2 critics). If the reconciler downgrades
    a Codex-twin-only BLOCKER to CONCERN (or CONCERN to NIT) to resolve
    a disagreement, that severity-downgrade is recorded via `task.py
    defer-concern --by reconciler` carrying the reconciler's rationale.
    This is the ONLY non-user `--by` value the CLI + library accept on
    defer-concern; all other `--by` values are rejected at both layers.
    The reconciler may NOT raise new concerns beyond what either
    reviewer raised (mirrors the existing "no new findings" rule).
    Persisting a finding that IS already on the table is allowed and
    sometimes required: when the reconciler's adjudication establishes
    that a feature the plan's production path requires is deferred
    ("the production path will crash" / "X must close before the
    production run"), it persists that finding via `task.py
    raise-concern --by reconciler` (CONCERN minimum; BLOCKER when the
    production path provably crashes) so the Step 5c-ter dispatch gate
    sees it — verdict prose alone gates nothing (incident #509). See
    `.claude/agents/reconciler.md` § Persist deferred-production-path
    findings.
  implementer_marker_requirement: |
    Main's 4-section implementer marker contract (a)/(b)/(c)/(d) is
    preserved — the binding-concerns layer does NOT force a 5th
    section on every marker. When prior open concerns exist
    (`task.py list-concerns <N> --open-only --json` returns non-empty
    at round start), the implementer marker SHOULD include an OPTIONAL
    `### (e) Concerns addressed` section listing, per concern_id, the
    fix and the round at which `task.py address-concern` was called.
    When no prior concerns exist, the four-section shape is unchanged
    and the `code-reviewer` Step 0.5 mechanical check passes as before
    (it does NOT FAIL on a missing 5th section).
  reviewer_round_protocol: |
    Every reviewer (code-reviewer, critic, interpretation-critic,
    clean-result-critic, consistency-checker — Claude and Codex twins)
    MUST run `task.py list-concerns <N> --open-only --json` at the
    START of every round and inherit the result. The reviewer's
    verdict body MAY grow three optional sections (only when open
    concerns or this-round changes apply):
      - **Concerns raised this round:** new CONCERN/BLOCKER/NIT items
        persisted via `task.py raise-concern` with stable kebab-case ids.
      - **Concerns addressed by this round's implementer:** open
        concerns the reviewer verified are now fixed (reviewer calls
        `task.py address-concern` only when verifying — implementer
        also calls it after their own fix).
      - **Concerns still open from prior rounds:** open ids the
        reviewer is letting stand this round (typically because the
        current implementer round didn't claim to fix them).

# ──────────────────────────────────────────────────────────────────────
# Higher-level reviewer-pair config used by /issue's review-loop driver.
# Orthogonal to ensemble_review above — this block names the pair, the
# verdict vocabulary, and the markers each pair posts. The codex-* twin
# agents post via `task.py post-marker`.
#
# PRESERVED from the post-GH-migration yaml. The GH-era yaml predated
# this block.
# ──────────────────────────────────────────────────────────────────────
reviewer_pairs:
  max_rounds: 3
  verdicts:
    - pass
    - needs_targeted_fix
    - blocked_needs_user_decision
    - fail_not_worth_continuing
  pairs:
    code_review:
      reviewers:
        - claude-code-reviewer
        - codex-code-reviewer
      markers:
        - epm:code-review
        - epm:code-review-codex
    interpretation:
      reviewers:
        - claude-interpretation-critic
        - codex-interpretation-critic
      markers:
        - epm:interp-critique
        - epm:interp-critique-codex
    clean_result:
      reviewers:
        - claude-clean-result-critic
        - codex-clean-result-critic
      markers:
        - epm:clean-result-critique
        - epm:clean-result-critique-codex
  reconciler:
    marker: epm:review-reconcile
    after_round_3_rule: "Record the final critique, choose the minimal necessary fix, and continue unless a real user-decision blocker remains."

# ──────────────────────────────────────────────────────────────────────
# Codex-primary agents. Historically `analyzer`, `planner`, and
# `follow-up-proposer` were thin Claude wrappers that delegated their
# work to a headless Codex session (`companion task --write --effort
# xhigh`). On 2026-05-20 the three roles were flipped back to direct
# Claude execution after Codex hit the OpenAI-side ~10-minute per-turn
# wall-clock cap twice on the analyzer task #192 (turn_aborted reason=
# interrupted, ~9m 46s into the turn), silently leaving the thread dead
# upstream while codex-companion's status stream kept reporting
# "running." Codex's value is now confined to the five twin reviewer
# roles (codex-code-reviewer, codex-interpretation-critic,
# codex-clean-result-critic, codex-critic, codex-reviewer-deprecated),
# where prompts are short and turns reliably stay under the cap. The
# helper at `scripts/codex_task.py` remains the dispatch path for those
# twins.
# ──────────────────────────────────────────────────────────────────────
codex_primary_agents: []

# ──────────────────────────────────────────────────────────────────────
# Marker kinds. Restored to the full GH-era shape: each marker has
# `kind / posted_by / when / fields`. The auto-generated table block in
# markers.md is regenerated from this list via
# `workflow_lint.py --emit-tables`. Do NOT edit the rendered table by
# hand. `kind` carries the `epm:` prefix (matches the names used in
# events.jsonl, comments.jsonl, and `reviewer_pairs.pairs.*.markers`).
#
# Markers that existed in the GH-era yaml but are dropped under the
# local-files substrate:
#   - `clean-result-lint` (was a GitHub Actions workflow trigger;
#     replaced by `scripts/workflow_lint.py` running on the local VM as
#     a pre-commit hook and via `task.py audit`).
#   - `follows` / `followed-by` (manual GH-issue cross-link comments;
#     replaced by frontmatter `parent_id` / `child_ids` and the
#     `edges` table in tasks/REGISTRY.json).
# ──────────────────────────────────────────────────────────────────────
markers:
  - kind: "epm:auto-defaults"
    posted_by: skill
    when: "Step 0b"
    fields: "what fields were auto-filled in body.md frontmatter and the inferred values"
  - kind: "epm:codex-task-spawned"
    posted_by: scripts/codex_task.py
    when: "Whenever the orchestrator dispatches a Codex companion task via scripts/codex_task.py with --issue N"
    fields: "Codex job_id (task-xxxx-yyy), effort, write flag, poll interval, max-wait cap, probe-error cap"
  - kind: "epm:codex-task-completed"
    posted_by: scripts/codex_task.py
    when: "Codex companion task terminated cleanly (phase=done) after the polling loop observed it"
    fields: "Codex job_id, elapsed seconds, terminal phase"
  - kind: "epm:codex-task-failed"
    posted_by: scripts/codex_task.py
    when: "Codex companion task terminated non-cleanly (phase in {failed, cancelled}), force-cancelled after max-wait cap, force-cancelled by stall detector (phase=running but log untouched > stall_detect_secs), killed by SIGTERM/SIGINT, exceeded probe-error cap, post-spawn probe rejected the job-id, or spawn failed before a job-id was assigned"
    fields: "Codex job_id (if assigned), elapsed seconds, terminal phase OR error description (e.g. 'timed out after Ns', 'N consecutive probe failures; last error: ...', 'stall detected: phase=running but log file untouched for Ns')"
  - kind: "epm:clarify"
    posted_by: skill
    when: "Step 1"
    fields: "numbered clarifying questions OR 'No blocking ambiguities'"
  - kind: "epm:clarify-questions"
    posted_by: skill
    when: "Step 1"
    fields: "alias of epm:clarify used by some helper scripts; same body shape"
  - kind: "epm:clarify-answers"
    posted_by: skill (relaying user chat reply)
    when: "Step 1"
    fields: "user's answers to the most recent epm:clarify questions, persisted to events.jsonl"
  - kind: "epm:goal-updated"
    posted_by: task.py set-goal (called by skill at /issue Step 0c, by clarifier at Step 1, or by planner at /adversarial-planner Phase 1)
    when: "any time the canonical Goal-of-the-experiment is set or refined"
    fields: "from (prior `goal:` frontmatter value or null), to (new value), by (user|clarifier|planner), optional reason. One marker per actual change; idempotent re-application emits nothing."
  - kind: "epm:concern-raised"
    posted_by: task.py raise-concern (called by reviewer agents — code-reviewer, critic, interpretation-critic, clean-result-critic, consistency-checker, and Codex twins)
    when: "any review round, when a reviewer flags a new binding concern via the CLI (no-op for same-round same-severity idempotent re-raise)"
    fields: "concern_id (kebab-case), severity (BLOCKER|CONCERN|NIT), 80-char summary slice. Full payload (full summary, evidence, raised_by, raised_at_round) lives in concerns.jsonl; this mirror is an audit-log breadcrumb only. See § concerns_protocol."
  - kind: "epm:concern-addressed"
    posted_by: task.py address-concern (called by implementer / experiment-implementer / analyzer)
    when: "an implementer or analyzer claims to have fixed an open concern raised by a prior reviewer round"
    fields: "concern_id (kebab-case), severity (carried from the raise event), 80-char summary slice. Mirror to events.jsonl; full payload (addressed_by, addressed_at_round) in concerns.jsonl. The NEXT reviewer round verifies; if the concern is still visible, that reviewer re-raises, transitioning the concerns.jsonl record to `verified-open` instead of a fresh `raised`."
  - kind: "epm:concern-deferred"
    posted_by: task.py defer-concern (USER-ONLY; reconciler as severity-downgrade special case)
    when: "user explicitly defers an open CONCERN via gate id=15 (concern_deferral_request) OR reconciler downgrades a Codex-twin-only BLOCKER to CONCERN to resolve a disagreement"
    fields: "concern_id (kebab-case), severity (carried from the raise event; BLOCKER is rejected), 80-char summary slice. Mirror to events.jsonl; full payload (deferred_by, ≥40-char non-boilerplate deferral_rationale) in concerns.jsonl."
  - kind: "epm:concern-verified-open"
    posted_by: task.py raise-concern (any reviewer agent re-raising a concern that was previously marked `addressed`)
    when: "a reviewer reads `task.py list-concerns <N> --open-only` at round start, finds a prior round's `addressed` concern is in fact still visible, and re-raises it"
    fields: "concern_id (kebab-case), severity (typically same as original; reviewers MAY escalate), 80-char summary slice. Mirror to events.jsonl; full payload (new raised_by + raised_at_round bumped to current round) in concerns.jsonl. This event is what makes concerns BINDING across rounds — the audit trail makes 'implementer claimed fix but didn't' mechanically visible to all downstream reviewers."
  - kind: "epm:plan"
    posted_by: skill (via adversarial-planner)
    when: "Step 2"
    fields: "Goal, method delta, reproducibility card, success/kill criteria, GPU-hr estimate, pod intent"
  - kind: "epm:plan-approved"
    posted_by: skill (relaying user reply, OR auto in an autonomous session)
    when: "Step 2c"
    fields: "user `approve` reply; advances status from plan_pending to approved. In an autonomous session (EPM_AUTONOMOUS_SESSION=1) the skill auto-posts this when the plan's gpu_hours_total <= EPM_PLAN_AUTOAPPROVE_GPU_HOURS (default 100); note records the estimate + cap."
  - kind: "epm:awaiting-spend-approval"
    posted_by: skill
    when: "Step 2c (autonomous session, over cap or missing estimate)"
    fields: "Posted when an autonomous session's plan estimate exceeds EPM_PLAN_AUTOAPPROVE_GPU_HOURS (or the estimate is missing/unparseable — fail-safe). Records gpu_hours_total + cap; task parks at plan_pending awaiting user approval. ALSO posted at Step 2 if a session must exit before approval with no pod yet provisioned (orphan-pod guard)."
  - kind: "epm:consistency"
    posted_by: skill (via consistency-checker)
    when: "Step 2b"
    fields: "PASS/WARN/BLOCK verdict, variables that differ from parent, shared baseline check"
  - kind: "epm:proposed-tests"
    posted_by: skill (via implementer / experiment-implementer)
    when: "Step 4b, TDD mode only"
    fields: "Posted ONLY when the plan body contains `### TDD: yes` or the user requests TDD. Body: ≥1 happy-path + ≥2 distinct error/edge-case tests, behavior-focused, in fenced blocks. Implementer EXITs after posting and awaits user `approve-tests` reply. Skill pauses pending approval, then resumes Step 4b."
  - kind: "epm:approve-tests"
    posted_by: user via task.py post-marker (interactive) OR skill (autonomous auto-approve)
    when: "Step 4b TDD gate resume (gates.conditional.tdd_gate; CLAUDE.md auto-continuation gate 7)"
    fields: "Approval of the proposed test surface — the resume signal the parked TDD gate waits for. Must be posted AFTER the `epm:proposed-tests` event it approves (the Step 0 resume router compares event order). Interactive: the user posts it via `task.py post-marker <N> epm:approve-tests`. Autonomous (EPM_AUTONOMOUS_SESSION=1): the skill auto-posts it IFF the proposed-tests body lists ≥1 test per acceptance criterion from the original task body, then re-spawns the implementer with `tdd_approved=true` in the same turn."
  - kind: "epm:experiment-implementation"
    posted_by: skill (via experiment-implementer)
    when: "Step 4b"
    fields: "Posted for type=experiment tasks. Body MUST follow the four-section shape `(a) What was done` / `(b) Considered but not done` / `(c) How to verify` / `(d) Needs human eyeball`."
  - kind: "epm:smoke-architecture-check"
    posted_by: skill (via experiment-implementer)
    when: "Step 4b (implementer report-time, before code-review)"
    fields: |
      Implementer self-tag verifying smoke and sweep paths share the
      same dispatcher / subprocess shape / env injection / logging
      surface. Body shape: one of:
        `verdict: PASS_UNIFIED` — smoke IS sweep with one cell
          (`--cells 1 --seeds 1` or equivalent); both paths share the
          same dispatcher and subprocess shape end-to-end, AND the
          cell-subset parameterization threads through EVERY phase the
          dispatcher executes (train, eval enumeration, anchor/analyze
          tolerance). A subset honored by the train loop only, with a
          downstream phase re-enumerating the full registered grid, is
          FAIL_NO_CANARY (incident #546 round 1, 2026-06-10: PASS_UNIFIED
          train + full-grid cross-eval → HF 404 on never-trained
          adapters; the smoke could never pass by construction).
        `verdict: PASS_CANARY canary_cell=<cell_id>` — paths diverge
          (e.g., smoke uses in-process train, sweep uses subprocess
          wrapper) AND the plan §4 Design section justified the
          divergence in two sentences AND named the canary cell that
          exercises the sweep path during smoke.
        `verdict: FAIL_NO_CANARY` — paths diverge without the §4
          justification + canary; implementer also emits a
          `workflow-fix-candidate v1` suggesting re-architect toward
          unification. SKILL.md Step 6d.0 gate (inline gates id=10)
          refuses to dispatch experimenter on FAIL_NO_CANARY — bounces
          to planner for unification re-architect.
      Rationale: task #397 rounds 9/10/10' (2026-05-27) — smoke ran
      in-process `train_one_cell`; sweep ran `run_one_cell.py` as a
      subprocess. Smoke kept PASSing; sweep crashed within ~5s of nohup
      on every architectural assumption the in-process path silently
      satisfied. Round 11's pivot was to UNIFICATION (in-process
      serial). Unification is the default; canary is the escape hatch
      when unification is genuinely impossible (e.g., per-cell vLLM
      that can't reset in-process).
  - kind: "epm:compute-deviation"
    posted_by: skill (via experiment-implementer)
    when: "Step 4b (implementer report-time, before code-review)"
    fields: |
      Posted when the implementer's resolved per-cell parameters project
      a wall-time deviation exceeding 2× any row in the planner's §9
      per-component compute-projection table. Body shape:
      `component: <planner-§9-row-name> planned_wall_h: <P> projected_wall_h: <X> ratio: <Y> basis: <planner-§9-row-basis>`.
      Optional: `action: auto_descope_to_<spec>` when the orchestrator's
      pivot_criteria.compute_deviation_over_2x logic identifies a
      descope that keeps ratio ≤ 1.5× AND preserves statistical power
      per the planner's §9 stratification spec. When `action` is
      present, the orchestrator continues with the descoped sweep.
      When absent, the orchestrator surfaces
      gates.conditional.compute_deviation_resolution (id=12) with the
      2-option pivot prompt. Rationale: task #397 round 6 (2026-05-27) —
      projection was 3-4× plan §12 but surfaced as "needs human
      eyeball" rather than as a structural pivot, costing ~17h before
      the user noticed. Per the 2026-05-22 workflow.yaml PHILOSOPHY
      directive, auto-pivot is the default; halt is the rare exception.
  - kind: "epm:new-bug-class"
    posted_by: skill (via experiment-implementer)
    when: "Step 4b (implementer report-time, before code-review)"
    fields: |
      Implementer self-tag that this round's fix touches a previously-
      untouched module/pattern in the current task's implementer
      sequence. Body shape: `bug_class: <short_snake_case_tag>`.
      Example tags: `pod_side_task_py_shellout`, `vllm_teardown_oom`,
      `subprocess_wrapper_missing_upload`, `dispatcher_env_loading`,
      `cwd_relative_log_path`.

      EXCLUSION RULE: if this round's bug is a workflow-surface bug
      per `.claude/rules/workflow-fix-on-bug.md` § "Yes — emit", emit
      `<!-- workflow-fix-candidate v1 -->` in the report text INSTEAD
      OF posting `epm:new-bug-class v1`. The whack-a-mole detector
      at SKILL.md Step 5.bis(b) EXCLUDES workflow-fix-candidate rounds
      from the strategy-pivot count — workflow-improver handles those
      same-turn, the experiment continues.

      The detector counts distinct `bug_class` values in the trailing
      5 implementer rounds (rounds N-4..N). Two triggers:
      - PRIMARY: 3 distinct tags across the 3 most recent non-excluded
        rounds.
      - SECONDARY: 2 distinct tags across the 2 most recent
        non-excluded rounds AND at least 1
        `epm:compute-deviation v1` event in the trailing 5 rounds.
      "Consecutive" means consecutive across non-excluded rounds: when
      an excluded round sits between two tagged rounds, it is skipped
      and the two tagged rounds count as consecutive.
      On fire, the orchestrator surfaces
      gates.conditional.whack_a_mole_pivot (id=11) with the 2-option
      pivot prompt.

      Rationale: task #397 (2026-05-27) — distinct bug classes across
      rounds 8 (vllm_teardown_oom) + 9 (workflow-fix-candidate,
      EXCLUDED) + 10 (subprocess_wrapper_missing_upload) with
      compute-deviation at round 6 trigger the SECONDARY rule at the
      start of would-be round-10' relaunch — one round earlier than
      the user's manual round-11 recognition.
  - kind: "epm:code-review"
    posted_by: skill (via code-reviewer)
    when: "Step 5"
    fields: "PASS / CONCERNS / FAIL verdict + line-level findings against the diff. v<n> per round"
  - kind: "epm:code-review-codex"
    posted_by: skill (via codex-code-reviewer)
    when: "Step 5"
    fields: "Codex (gpt-5.5 via companion task) twin of code-reviewer. PASS/CONCERNS/FAIL verdict + line-level findings against the same diff, same rubric. v<n> per round, paired with epm:code-review v<n>."
  - kind: "epm:review-reconcile"
    posted_by: skill (via reconciler)
    when: "any review step where Claude and Codex disagree"
    fields: "Binding final verdict + per-finding adjudication table + rationale anchored to artifact evidence. Does NOT count toward per-reviewer round cap. Reconciler may NOT add findings beyond what either reviewer raised. The adjudicated role (`code-reviewer` / `interpretation-critic` / `clean-result-critic` / `critic`) is distinguished by the body's `**Role under adjudication:**` field, NOT by the marker kind — there is exactly ONE marker-mode reconcile kind. The `/adversarial-planner` Phase 2 in-context reconcile prints a separate role-tagged `epm:plan-critique-reconcile` tag to stdout (parsed by the skill) and does NOT post an events.jsonl marker."
  - kind: "epm:hf-gate-pending"
    posted_by: skill
    when: "Step 6a"
    fields: "model id, HF gate status, retry plan if rejected"
  - kind: "epm:carry-over-missing"
    posted_by: skill
    when: "Step 6a.5"
    fields: "unresolved carry-over artifact URLs (HF/WandB) the plan cites; status:blocked — user re-uploads or corrects the plan, then re-runs /issue <N>"
  - kind: "epm:hf-quota-exceeded"
    posted_by: skill
    when: "Step 6a.6"
    fields: "verbatim quota 403 text, probed repo id, namespace usage if known; status:blocked — user frees space / upgrades storage. Only the explicit storage-quota 403 posts this; non-quota probe errors are fail-soft (proceed to 6b)"
  - kind: "epm:pod-provisioned"
    posted_by: skill
    when: "Step 6b"
    fields: "RunPod pod name, host, port, GPU type, GPU count, gpu_intent"
  - kind: "epm:pod-pending"
    posted_by: skill
    when: "Step 6b"
    fields: "RunPod provision error, retry instructions"
  - kind: "epm:preflight"
    posted_by: skill
    when: "Step 6c"
    fields: "Full --json preflight report (resumed pods only)"
  - kind: "epm:launch"
    posted_by: skill
    when: "Step 6d"
    fields: "Worktree, branch, PR, pod, PID, log path, code-review verdict, WandB URL"
  - kind: "epm:run-launched"
    posted_by: experimenter
    when: "Step 7"
    fields: |
      Records the actual `nohup ... &` launch (PID + timestamp); paired
      with epm:launch. REQUIRED payload fields (note shape):
      `pod=<name> pid=<pid> log_abs=<absolute_log_path>
      cmd='<dispatch>'`. The experimenter MUST call `os.path.abspath()`
      on the log path before posting AND verify with `ls -la <log_abs>`
      on the pod (logs must exist at that exact absolute path; relative
      paths burn polling-loop cycles when the orchestrator's
      `poll_pipeline.py` looks for them at the wrong cwd). Back-compat:
      a transition window accepts the legacy `log=` field as a fallback
      when `log_abs=` is absent; this fallback is scheduled for removal
      after 2026-06-15 (TODO comment in SKILL.md Step 6d.1 parse code).
      Rationale: task #397 (2026-05-27) — poller read
      `/workspace/logs/issue-397.log` while dispatcher wrote
      `/workspace/your-project/logs/issue-397-sweep.log`,
      burning 27 min of "crash diagnosis" on a healthy run.
      (The earlier draft of this schema required `cwd=` as well, but
      the orchestrator's Step 6d.1 parse never consumed it; Codex
      round-1 MAJOR-4 flagged it as dead payload. Dropped 2026-05-27.)
  - kind: "epm:progress"
    posted_by: experimenter / implementer
    when: "during run"
    fields: "Milestone description + metric snapshot"
  - kind: "epm:fact-candidates"
    posted_by: poll_pipeline.py (draining a pod-side sentinel written by run_experiment_<N>.py Phase 0)
    when: "during run (fact-teaching experiments only; pod-side sentinel emitted at end of Phase 0)"
    fields: |
      Ranked candidate-fact table for the obscure-real regime of a
      fact-teaching experiment. Body shape: a CSV/markdown table with
      one row per candidate fact passing the log-prob band filter
