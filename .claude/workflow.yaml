      `status=gate gate=fact-candidates` return — the poller posts
      this marker from the VM (not the pod), then SKILL.md Step 6d.4
      surfaces `gates.conditional.fact_candidates` via AskUserQuestion
      and the user picks one `id`. Originated with task #407
      (run_experiment_407.py); reused by task #444 and any future
      fact-teaching task mirroring the same 8-phase argparse driver.
