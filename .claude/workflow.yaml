      of question ids touched.
  - kind: "epm:living-docs-updated"
    posted_by: skill (after user confirm/edit + scripts/living_docs.py apply commits)
    when: "/issue completion hook, on user confirm/edit at gates.conditional.living_docs_update"
    fields: |
      Posted after the user confirms (or confirms-with-edits) the
      living-docs-updater's proposal AND `scripts/living_docs.py apply`
      commits the patch (atomic flock + single commit, dated changelog
      line prepended). Payload: the APPLIED unified diff, which question
      id(s) were touched, the new State trailer per touched question
      (maturity emoji · LOW|MODERATE|HIGH · updated <date> · evidence:
      #...), and whether docs/papers.md was also edited.
  - kind: "epm:living-docs-update-rejected"
    posted_by: skill
    when: "/issue completion hook, on user reject at gates.conditional.living_docs_update"
    fields: |
      Posted when the user declines the living-docs-updater's proposal at
      the gates.conditional.living_docs_update gate. Non-fatal: the
      experiment stays completed; nothing is written to the living docs.
      Payload: the rejection reason (one line) + the rejected proposal
      preserved inline so a future backstop re-synthesis (/weekly) can
      retry with sharper context.
  - kind: "epm:abort"
    posted_by: skill
    when: "any time"
    fields: "Abort reason. Triggered by status:blocked transition."
  - kind: "epm:failure"
    posted_by: specialist
    when: "on crash"
    fields: "Traceback + last 50 log lines + partial results. SHOULD include failure_class: infra | code | data line. `data` (a factual gap only the user can fill) is posted per the halt-criterion contract — the task parks at status:blocked and does NOT enter the Step 7 crash-fix routing, which covers infra | code only; scripts/failure_classifier.py likewise emits only infra | code."
  - kind: "epm:failure-classify-error"
    posted_by: skill
    when: "Step 7 (epm:failure body missing failure_class AND scripts/failure_classifier.py exited non-zero)"
    fields: "Captured stderr from the failure_classifier.py invocation. Audit record only: the orchestrator treats the unclassifiable failure as `code` (conservative default) and applies the code-class row of the Step 7 failure table; this marker preserves WHY the classifier could not produce a verdict."
  - kind: "epm:failure-lesson"
    posted_by: skill (orchestrator)
    when: "Step 7, when a crash-fix round resolves an epm:failure (experiment-implementer crash-fix report, or a respawned experimenter's relaunch-with-fix report); also Step 6d, when an experimenter's launch report carries the block for a within-turn launch fix (dying launch fixed + relaunched in the same spawn — no epm:failure posted)"
    fields: "failure_class (code|infra|data), phase (pipeline phase or script), lesson (1-3 sentences: the trap + the fix, written for the NEXT agent — no transcript dumps), generalizes (yes|no — yes only if the trap plausibly recurs beyond this issue), owning_agent (experiment-implementer|experimenter), gotcha_candidate (yes|no — yes for codebase/infra traps that belong in .claude/rules/gotchas.md). Posted verbatim from the resolving agent's report block. On generalizes=yes the orchestrator ALSO persists the lesson immediately to .claude/agent-memory/<owning_agent>/ (feedback_<slug>.md + MEMORY.md index line; explicit-path commit + push, standing rule 2026-06-02) so parallel same-day sessions load it on their next spawn; on gotcha_candidate=yes it ALSO routes a workflow-fix candidate targeting .claude/rules/gotchas.md through the workflow-fix-on-bug auto-spawn default. generalizes=no lessons get the marker only (no memory write). /daily is the deduplicating consolidator (reads the day's markers, dedupes against agent memories, promotes recurring lessons into rules, prunes over-eager generalizes=yes entries)."
  - kind: "epm:experimenter-respawn"
    posted_by: skill
    when: "Step 7 (failure_class=infra path)"
    fields: "Records re-spawn on the same branch without an implementer round. v<n> per respawn; cap 3."
  - kind: "epm:strategy-pivot"
    posted_by: skill (orchestrator)
    when: "any strategy pivot — Step 5 code-review ensemble cap-3, whack-a-mole detector fire, plan-contradiction re-plan, debugging-wall pivot (see § pivot_criteria)"
    fields: "v<n> per pivot, top-level on the task. Records the pivot rationale + what changes: which strategy failed, the fundamentally different design being tried next, and that revision_round RESETS to 1 on the new plan. Counts toward the ~3-pivots-before-block rule (CLAUDE.md STATE-TO-blocked criteria). Every pivot site reuses this ONE kind — do NOT introduce per-pivot-source marker kinds."
  - kind: "epm:merged"
    posted_by: skill
    when: "Step 9b (experiments, at awaiting_promotion) or Step 10d (code paths, at completed)"
    fields: "Merge SHAs (one per commit when rebase-merged) for the safe path. For the artifact-confirmed path (guard 3 tripped: branch far behind main OR based on a non-mainline parent branch like a still-unmerged issue-<M>), instead: {artifact_confirmed: true, full_rebase_deferred: true, reason: '...', verified_paths: [...]} or, if a surgical additive checkout was needed, {artifact_confirmed: true, full_rebase_deferred: true, surgical_checkout: true, files: [...]}. Worktree is NOT removed (kept for inspection; reaped later by worktree_audit.py)."
  - kind: "epm:merge-failed"
    posted_by: skill
    when: "Step 9b / Step 10d auto-merge hit a conflict / non-mergeable PR"
    fields: "gh/git error + branch + worktree path. Non-blocking: the task still parks (experiments) / completes (code paths); retried idempotently on the next /issue <N>."
  - kind: "epm:stale"
    posted_by: skill
    when: "Step 7 (>4h silence)"
    fields: "Note asking user to investigate"
  - kind: "epm:step-completed"
    posted_by: skill
    when: "every EXIT site"
    fields: "step, exit_kind (clean|parked|failure-exit), next_expected_step, optional notes. Consumed by the §5 re-entry router (orchestrate/resume.py)."
  - kind: "epm:workflow-fix-candidate"
    posted_by: orchestrator (parent assistant, /issue skill, or research-pm) on receiving a candidate block from any subagent's return text — or from the orchestrator's own observation
    when: "Any agent emits a <!-- workflow-fix-candidate v1 --> block in its return text. The orchestrator logs the candidate before deciding whether to spawn workflow-improver. Posting target: the events.jsonl of the task the emitting agent was working on; if no task, the file-based fallback .claude/cache/workflow-fix-events.jsonl."
    fields: "target_file (workflow surface path, relative to repo root), bug_observed (one sentence), why_workflow_gap (one sentence), proposed_change (one sentence), diff_sketch (2-10 lines), confidence (low|medium|high), emitting_agent (subagent type), related_task (task ID or n/a)"
  - kind: "epm:workflow-fix-applied"
    posted_by: orchestrator after workflow-improver returns with reviewer PASS (or surgical change ≤10 lines, single file, no behavior change)
    when: "workflow-improver landed a diff that resolves a workflow-fix-candidate. The diff is committed on workflow-improver's worktree branch; this marker records what changed and links to the originating candidate."
    fields: "files_changed (list of paths), unified_diff (full diff inline), reviewer_verdict (PASS|skipped-surgical), commit_sha (workflow-improver's worktree commit), originating_candidate (the candidate block that triggered this)"
  - kind: "epm:workflow-fix-failed"
    posted_by: orchestrator when workflow-improver returns FAIL (reviewer rejected after 3 rounds, lint failed, out-of-scope deflection, or worktree spawn refused)
    when: "Same trigger as workflow-fix-applied but the workflow-improver returned with a non-PASS verdict. The candidate is preserved inline so a future pass can retry with sharper context."
    fields: "failure_reason (reviewer-FAIL|lint-FAIL|out-of-scope|worktree-refusal|other), originating_candidate (verbatim), workflow_improver_report (terse summary of what was attempted and why it failed)"

# ──────────────────────────────────────────────────────────────────────
# /issue lifecycle steps. Required by the §5 epm:step-completed re-entry
# router (src/research_workflow/orchestrate/resume.py +
# scripts/post_step_completed.py). `entry_status_label` MUST be a
# non-empty list of concrete status names — the literal `any` is rejected
# at schema-validation time. The §5 router treats `status:blocked` as a
# hard-coded full-replay trigger BEFORE consulting either
# entry_status_label or the marker.
#
# All entry_status_label values reference statuses declared above. All
# next_expected_step values reference another step id or the terminal
# sentinel. All posts_marker values reference a marker kind declared
# above.
# ──────────────────────────────────────────────────────────────────────
  - kind: "epm:backend-selected"
    posted_by: backends.router.route (via injected marker_poster — defaults to backends.slurm.post_marker_via_task_py); also posted by the legacy backends.selector.select_backend path
    when: "Whenever the router picks (or escalates / re-routes to) a backend for an issue's run. Posted on every launch=True decision, plus a pre-escalation intermediate marker whenever the auto chain is about to spend GCP credit."
    fields: |
      Records WHICH compute backend was chosen, WHY, and the full ladder
      of per-lane attempts the router walked (slice-5 router /
      legacy-selector shared shape; the router emits the extended body
      with `attempts` populated).

      Body shape (JSON in the event `note` field):
        `requested_kind: <runpod|cluster|nibi|fir|gcp|mila|null>
         chosen_kind:    <runpod|cluster|nibi|fir|gcp|mila>
         reason:         <override|reconnect|auto_started|
                          auto_fallback_gcp|no_compute_available|
                          workload_failure|frontmatter_default|
                          frontmatter_explicit|slurm_not_implemented|
                          slurm_max_wait_exceeded|slurm_hard_failure|
                          slurm_started>
         cluster:        <nibi|fir|null>
         elapsed_seconds: <float>
         attempts:       [{kind, cluster, est_start_seconds_raw,
                            est_start_seconds_clamped, outcome, detail,
                            elapsed_seconds}, ...]
         extra:          {cancel_race?, gcp_attempts_today?,
                          intermediate?,
                          override_without_frontmatter?,
                          override_conflicts_frontmatter?,
                          frontmatter_backend_unrecognized?,
                          frontmatter_backend?,
                          boot_disk_default_with_ft_intent?, ...}`

      `override_without_frontmatter: true` (optional) is stamped by the
      dispatch CLI (`scripts/dispatch_issue.py`, via a marker_poster
      decorator) when `launch` was invoked with an explicit
      `--backend runpod` while the task's `backend:` frontmatter does
      not name a backend (absent/empty, or an explicit `auto` — which
      states the auto-routing intent even more explicitly than absence)
      — i.e. the GCP-first auto default was bypassed at the
      CLI with no frontmatter backing. Visibility only: the launch is
      never blocked, and the CLI also emits a LOUD stderr warning naming
      the legitimate residual gaps (70B intents / interactive SSH-MCP
      orchestration / runs > GCP --max-run-duration default 24h / SLURM
      venv-extras mismatch).

      `override_conflicts_frontmatter: true` (optional) is stamped by
      the same decorator when the explicit `--backend runpod` was passed
      while the frontmatter names a DIFFERENT recognized lane (`gcp` /
      `nibi` / `fir` / `mila`, or the legacy `cluster` alias — which
      normalizes to nibi) — the task explicitly contradicts the
      override, a stronger signal than absence.
      `frontmatter_backend_unrecognized: true` (optional) is stamped
      when the frontmatter `backend:` value is not a recognized backend
      at all (typo / non-string YAML value, e.g. `gpc` or `true`) —
      task hygiene noise masquerading as frontmatter backing, not a
      legitimate override. Both new flags also carry
      `frontmatter_backend: "<raw lowercased value>"` so the marker is
      self-explanatory. The three flags are DISTINCT and never reused
      across cases, so the dashboard can tell "bypassed auto" /
      "contradicted a named lane" / "task hygiene problem" apart. Same
      scope as `override_without_frontmatter` (the explicit CLI
      `--backend runpod` path only); same degrade (unreadable
      frontmatter skips all checks); visibility only — the launch is
      never blocked. A frontmatter `backend: runpod` is the one
      legitimate backing and stays silent.

      `boot_disk_default_with_ft_intent: true` (optional) is stamped by
      the same decorator when `launch` was invoked with a gcp-reachable
      backend (`gcp`, or `auto` whose resolved lane order includes gcp)
      and an `ft-*` intent that maps to a GCP machine, WITHOUT
      `--boot-disk-gb` — the lane provisions the 300 GB pd-ssd default
      (`backends/gcp.GcpConfig.default_boot_disk_gb`), which a ZeRO-3
      full-FT fills with optimizer-state checkpoints in ~1h (incident
      #606, 2026-06-12: kernel panic on the full disk, cloud-init
      ENOSPC, SSH key-provisioning lockout, 4x A100 idling until
      deletion). Visibility only — the launch is never blocked
      (small-disk ft smokes stay legitimate); the CLI also emits a LOUD
      stderr warning pointing at the plan's Reproducibility pod-row
      disk size.

      Reason codes:
        * `override`              — explicit `backend:` frontmatter ran.
        * `reconnect`             — existing live job/instance found.
        * `auto_started`          — auto chain picked a free lane and
                                    it reached RUNNING within the park.
        * `auto_fallback_gcp`     — the auto chain launched on GCP:
                                    the PRIMARY lane under the GCP-first
                                    standing default
                                    (DEFAULT_AUTO_LANE_ORDER = gcp,
                                    nibi, fir, mila; override via
                                    EPM_AUTO_LANE_ORDER), or the
                                    escalation after every free lane
                                    park-failed under a free-first
                                    override. Reason code name kept for
                                    schema stability in both positions.
                                    The pre-spend intermediate marker
                                    (extra.intermediate=true) AND the
                                    post-launch final marker both carry
                                    this reason.
        * `no_compute_available` — every lane in the resolved auto
                                    order failed or was unavailable
                                    (e.g. GCP capacity-failed AND every
                                    free lane park-failed); surfaced via
                                    NoComputeAvailableError → epm:failure.
        * `workload_failure`      — GCP workload failure; no auto-
                                    fallback (would re-crash).
        * `frontmatter_*`/`slurm_*` — legacy selector codes, preserved
                                    for back-compat.

      The attempts list mirrors the router's per-lane ladder in the
      ACTUAL attempt order (GCP first under the GCP-first standing
      default): ranked free lane est-starts (raw + clamped — negative
      raw values clamp to 0 for ranking but the raw is preserved for
      the audit trail), per-lane outcomes (`launched`,
      `park_cap_exceeded`, `terminal_before_running`, `launch_failed`,
      `reconnected`, `provisioning_failure`, `workload_failure`,
      `attempt_cap_exceeded`, `quota_headroom_insufficient` — the GCP
      lane's pre-create regional-quota probe read insufficient headroom
      and skipped the lane WITHOUT burning a daily attempt, #608), and
      the GCP lane with its per-day attempt-count guard reading. A GCP
      `provisioning_failure` attempt's `detail` carries the captured
      gcloud `stderr_tail` (~1KB) alongside the classified reason
      (#608: the stderr was previously dropped everywhere). v1.
  - kind: "epm:cluster-launched"
    posted_by: backends.slurm.SlurmBackend.launch (via backends.slurm.post_marker_via_task_py)
    when: "Step 6b (immediately after sbatch submit succeeds, before the submit-and-park watchdog runs)"
    fields: |
      SLURM-side launch handle. Body shape (JSON in the event `note` field):
        `cluster:     <nibi|fir>
         job_id:      <numeric>
         job_name:    <wf-issue-<N>[-<plan_hash>]>
         scratch_dir: <$SCRATCH/wf/issue-<N>>
         log_path:    <$SCRATCH/wf/issue-<N>/job.out>
         account:     <your-slurm-account>
         gpus:        <N>
         time_budget_hours: <H>`
      Posted INSTEAD of `epm:run-launched` on the cluster path; the
      RunPod path's `epm:run-launched` schema is unchanged. v1.
  - kind: "epm:cluster-poll"
    posted_by: backends.slurm_monitor.build_poll_result (via backends.slurm.post_marker_via_task_py)
    when: "every Step 6d.2 polling-loop tick on the cluster path that observes a status / phase / slurm_state CHANGE vs the most recent prior cluster-poll (dedup'd against events.jsonl)"
    fields: |
      One-tick PollResult snapshot for a cluster job. Body shape (JSON
      in the event `note` field) mirrors the RunPod `poll_pipeline.py`
      JSON the orchestrator already consumes:
        `status: <running|done|stalled|dead|gate>
         current_phase: <preflight|cpt|sft|dpo|em|eval|done|...>
         heartbeat_sec_ago: <int>
         log_tail_excerpt: <last ~2KB>
         gpu_util: <busy|idle>
         job_id: <numeric>
         slurm_state: <PENDING|RUNNING|COMPLETED|FAILED|...>`
      Posted only on a transition (status, current_phase, or
      slurm_state differs from the last cluster-poll for this job_id).
      A long-running job that stays in the same phase doesn't spam
      markers. v1.
  - kind: "epm:cluster-terminal"
    posted_by: backends.slurm_monitor.build_poll_result (via backends.slurm.post_marker_via_task_py; exactly once per job_id)
    when: "the first poll-tick that observes a terminal state (status in {done,dead}); subsequent terminal observations short-circuit by reading the persisted marker"
    fields: |
      Persisted terminal-state breadcrumb so idempotent reconnect after
      squeue/scontrol ageout still finds the authoritative answer. Body
      shape:
        `job_id: <numeric>
         cluster: <nibi|fir>
         slurm_state: <COMPLETED|FAILED|TIMEOUT|PREEMPTED|NODE_FAIL|CANCELLED|OUT_OF_MEMORY>
         exit_code: <"0:0"|"N:M"|null>
         observed_at: <ISO8601>
         next_action: <interpret|fallback_runpod|investigate>`
      `next_action=interpret` for COMPLETED, `fallback_runpod` for
      PREEMPTED/TIMEOUT/NODE_FAIL (the orchestrator re-routes a fresh
      run to RunPod), `investigate` for FAILED/OOM (the operator picks
      whether to retry or pivot). v1.
  # ── campaign lifecycle markers (/campaign <N>, task #586) ──────────────
  - kind: "epm:campaign-started"
    posted_by: campaign skill (Step 0)
    when: "the /campaign session validates the brief (kind: campaign, status approved), initializes artifacts/campaign-state.json, flips status to running, and arms the /campaign-tick cron"
    fields: "question_anchor, budget (gpu_hours_total), limits (max_experiments / max_concurrent_children / per_child_gpu_hours_cap / wall_clock_days), initial experiment DAG size. v1."
  - kind: "epm:campaign-child-spawned"
    posted_by: campaign skill (Step 1.4, one per child)
    when: "the campaign files a child task (task.py new --kind experiment --parent <N>) and spawns its autonomous session (spawn_session.py spawn-issue --issue <child> --auto)"
    fields: "child task id, experiment id (DAG row), gpu_hours_est committed, remaining budget headroom, open slots after the spawn. v1."
  - kind: "epm:campaign-child-ingested"
    posted_by: campaign skill (Step 1.1, one per landed child)
    when: "a child reached awaiting_promotion/completed and the campaign ingested its CRITIC-GATED clean-result (title claim + confidence tag + TL;DR findings) into artifacts/world-model.md"
    fields: "child task id, headline claim, confidence tag, belief_shift (yes|no), dry_counter after the update. v1."
  - kind: "epm:campaign-digest"
    posted_by: campaign skill (Step 1.5, at most every 24h)
    when: "the daily campaign digest fires (last_digest_at older than 24h at a decision round)"
    fields: "budget spent/committed/total (GPU-hours), children table (id / status / headline), current working belief + confidence, next planned arms. v1."
  - kind: "epm:campaign-stalled"
    posted_by: scripts/autonomous_session_watch.py (campaign pass)
    when: "a live campaign session posted no skill-posted epm:campaign-* marker AND no child task posted any marker for > EPM_CAMPAIGN_STALL_S (default 2h); one alert per stalled episode (the second consecutive stalled check stop-then-respawns, cap 3/episode)"
    fields: "stall window in hours, note carries the [autonomous_session_watch:campaign] sentinel so the alert never resets the staleness clock it measures. v1."
  - kind: "epm:campaign-stopped"
    posted_by: campaign skill (Step 2)
    when: "a stop criterion fired (user-stop tag / wall-clock / budget / max experiments / confidence target / dry counter) and the campaign finalizes (final report into the task body, status -> completed)"
    fields: "stop_reason (the check_stop reason string), totals (children filed/ingested/abandoned, GPU-hours committed), pointer to the final report + world-model artifact. v1."
steps:
  - id: "0"
    name: load_state
    entry_status_label:
      - proposed
      - clarifying
      - planning
      - plan_pending
      - approved
      - queued
      - implementing
      - code_reviewing
      - testing
      - running
      - verifying
      - interpreting
      - reviewing
      - under_review
      - awaiting_promotion
      - followups_running
      - blocked
      - completed
      - done_experiment
      - done_impl
    entry_condition: always
    next_expected_step: "0b"
  - id: "0b"
    name: defaulting_autofill
    entry_status_label:
      - proposed
      - clarifying
      - planning
      - plan_pending
      - approved
      - queued
      - implementing
      - code_reviewing
      - testing
      - running
      - verifying
      - interpreting
      - reviewing
      - under_review
      - awaiting_promotion
      - followups_running
      - blocked
      - completed
      - done_experiment
      - done_impl
    entry_condition: "missing status:* OR empty body OR missing type frontmatter"
    posts_marker: "epm:auto-defaults"
    next_expected_step: "1"
  - id: "1"
    name: clarifier
    entry_status_label:
      - proposed
      - clarifying
    entry_condition: "epm:clarify not yet posted OR user has new chat answers in comments.jsonl"
    posts_marker: "epm:clarify"
    next_expected_step: "2"
  - id: "2"
    name: adversarial_planner
    entry_status_label:
      - planning
    entry_condition: "clarifier All-clear; plan not yet posted"
    posts_marker: "epm:plan"
    next_expected_step: "2b"
  - id: "2b"
    name: consistency_check
    entry_status_label:
      - planning
    entry_condition: "plan posted; consistency check not yet run"
    posts_marker: "epm:consistency"
    next_expected_step: "2c"
  - id: "2c"
    name: plan_pending
    entry_status_label:
      - plan_pending
      - awaiting_approval
    entry_condition: "plan + consistency posted; awaiting user approve"
    next_expected_step: "3"
  - id: "3"
    name: worktree_setup
    entry_status_label:
      - approved
    entry_condition: "plan approved"
    next_expected_step: "4"
  - id: "4"
    name: dispatch_implementer
    entry_status_label:
      - approved
      - queued
      - implementing
    entry_condition: "worktree ready; specialist not yet dispatched"
    next_expected_step: "4b"
  - id: "4b"
    name: implementer_running
    entry_status_label:
      - implementing
    entry_condition: "specialist dispatched; awaiting epm:results or epm:experiment-implementation"
    posts_marker: "epm:experiment-implementation"
    next_expected_step: "5"
  - id: "5"
    name: code_review
    entry_status_label:
      - code_reviewing
    entry_condition: "epm:experiment-implementation posted"
    posts_marker: "epm:code-review"
    next_expected_step: "6a"
  - id: "5b"
    name: code_review_revise
    entry_status_label:
      - implementing
    entry_condition: "code-review FAIL, revision_round < 3"
    next_expected_step: "5"
  - id: "6a"
    name: pod_provision
    entry_status_label:
      - running
    entry_condition: "type=experiment AND no pod yet"
    next_expected_step: "6b"
  - id: "6b"
    name: pod_pending
    entry_status_label:
      - running
    entry_condition: "RunPod provision in flight"
    posts_marker: "epm:pod-pending"
    next_expected_step: "6c"
  - id: "6c"
    name: preflight
    entry_status_label:
      - running
    entry_condition: "pod ready; preflight not yet run"
    posts_marker: "epm:preflight"
    next_expected_step: "6d"
  - id: "6d"
    name: dispatch_experimenter
    entry_status_label:
      - running
    entry_condition: "preflight PASS; experimenter not yet launched"
    posts_marker: "epm:launch"
    next_expected_step: "7"
  - id: "7"
    name: experimenter_running
    entry_status_label:
      - running
    entry_condition: "epm:launch posted; awaiting epm:results"
    next_expected_step: "8"
  - id: "8"
    name: upload_verification
    entry_status_label:
      - verifying
    entry_condition: "epm:results posted"
    posts_marker: "epm:upload-verification"
    next_expected_step: "9a"
  - id: "9a"
    name: interpretation
    entry_status_label:
      - interpreting
    entry_condition: "upload-verification PASS"
    posts_marker: "epm:interpretation"
    next_expected_step: "9a-humanize"
  - id: "9a-humanize"
    name: tldr_humanize_loop
    entry_status_label:
      - interpreting
    entry_condition: "epm:clean-result-drafted v1 posted (first promotion only — not re-fired on 9a-bis REVISE rounds)"
    posts_marker: "epm:humanize-loop"
    next_expected_step: "9a-ter"
  - id: "9a-ter"
    name: free_analysis_followup_autorun
    entry_status_label:
      - interpreting
    entry_condition: "epm:humanize-loop v1 posted (PASS or cap); fires when the analyzer's Step 6.5 surfaced a `cost_class: free-analysis` + `headline_affecting: yes` follow-up that has not yet been run on this task (no `epm:free-analysis-followup-run v1` marker). No-op when no such follow-up exists or when the marker is already present (one round per task)."
    posts_marker: "epm:free-analysis-followup-run"
    next_expected_step: "9a-bis"
  - id: "9a-bis"
    name: clean_result_critique_loop
    entry_status_label:
      - interpreting
      - reviewing
    entry_condition: "epm:free-analysis-followup-run v1 posted OR Step 9a-ter no-op (no free-analysis follow-up to run, or marker already present)"
    posts_marker: "epm:clean-result-critique"
    next_expected_step: "9a-quater"
  - id: "9a-quater"
    name: methodology_reference
    entry_status_label:
      - reviewing
    entry_condition: |
      clean-result-critic PASS (or max rounds reached). Fires for
      `kind: experiment` always and for `kind: analysis` only when the
      task's `## Reproducibility` section names a training/eval
      methodology (skip `infra | batch | survey`). Idempotent per
      follow-up round: no-op when `epm:methodology-doc-generated v1` is
      present AND every analyzer-re-folded `epm:followup-scope v1`
      followup_label is recorded in a marker note (`extends=` /
      `no-new-methodology=`); an unrecorded label runs the EXTEND pass
      (SKILL.md Step 9a-quater) instead. The skill
      runs this step after the 9a-bis loop's PASS and BEFORE flipping
      `reviewing` -> `awaiting_promotion` (Step 9b in SKILL.md prose),
      so the link line landed in `## Reproducibility` is part of the
      same finished package the user promotes.
    posts_marker: "epm:methodology-doc-generated"
    next_expected_step: "10"
  - id: "9b-same"
    name: same_issue_followup_loop
    entry_status_label:
      - interpreting
      - reviewing
      - awaiting_promotion
      - completed
      - followups_running
    entry_condition: |
      An UNRUN `epm:followup-scope v1` is present (no matching
      `epm:same-issue-followup-run v1` with the same `followup_label`).
      Sibling of `free_analysis_followup_autorun` (9a-ter) under one
      principle: a follow-up that answers the SAME question as the
      parent Goal runs ON the parent issue — 9a-ter is the zero-GPU
      inline fast path, this loop is the GPU-backed path. The task
      moves to `followups_running` (tagged `followup-auto` for
      `source: proposer-9b`, `followup-manual` for `user-chat` /
      `step-10b-pick`) and HOLDS that status for the whole round —
      the normal pipeline `set-status` calls (`planning` /
      `plan_pending` / `approved` / `running` / `verifying` /
      `interpreting` / `reviewing`) are skipped, and `task.py
      set-status` refuses them from `followups_running` unless
      `--force-followup-exit` is passed (post-#533/#560); phase
      visibility comes from `stage=followup-<phase>` breadcrumbs +
      `epm:progress` markers. (`followups_running` in the entry list
      is the mid-round resume case after a crash.) Whether
      `/adversarial-planner` is re-invoked still follows the
      planner-exempt carve-out; the status no longer encodes it.
      The round loops through the abbreviated cycle on the SAME issue:
      amendment-scope /adversarial-planner (`plans/v{N+1}.md`,
      one-variable diff) -> consistency-checker (diffing the issue's
      OWN latest prior run, not a parent_id task) -> Step 2c plan
      approval (existing gates.inline plan_approval gate; no new gate)
      -> implementer + code-reviewer if code changes -> fresh
      `pod.py provision --issue <N>` -> run -> upload-verify ->
      analyzer re-folds the new finding into the EXISTING clean-result
      body (new `#### <finding>` H4; no --snapshot) ->
      clean-result-critic re-gates -> re-park at `awaiting_promotion`.
      Autonomous round cap: 2 `source: proposer-9b` rounds per task;
      user-initiated rounds are uncapped.
    posts_marker: "epm:same-issue-followup-run"
    next_expected_step: "2"
  - id: "9c"
    name: test_verdict
    entry_status_label:
      - testing
      - code_reviewing
    entry_condition: "code-change path (type=infra/batch/analysis/survey); inline tests"
    posts_marker: "epm:test-verdict"
    next_expected_step: "10"
  - id: "10"
    name: completion_audit
    entry_status_label:
      - awaiting_promotion
      - reviewing
      - under_review
      - testing
    entry_condition: "clean-result-critic PASS OR test-verdict PASS; pre-flight before Done"
    posts_marker: "epm:completion-audit"
    next_expected_step: "10a"
  - id: "10a"
    name: done_status_flip
    entry_status_label:
      - awaiting_promotion
      - reviewing
      - under_review
      - testing
    entry_condition: "completion-audit all ☑"
    posts_marker: "epm:done"
    next_expected_step: "10b"
  - id: "10b"
    name: follow_ups
    entry_status_label:
      - completed
      - done_experiment
      - done_impl
    entry_condition: "task moved to completed/"
    posts_marker: "epm:follow-ups"
    next_expected_step: "10d"
  - id: "10d"
    name: worktree_merge_auto
    entry_status_label:
      - awaiting_promotion
      - completed
      - done_experiment
      - done_impl
    entry_condition: "PR exists and is unmerged"
    posts_marker: "epm:merged"
    next_expected_step: terminal

# ──────────────────────────────────────────────────────────────────────
# Pod lifecycle config. Substrate-independent at this level — `pod.py`
# wraps RunPod regardless of how /issue gets invoked.
# ──────────────────────────────────────────────────────────────────────
runpod:
  planning_contract: runpod-spec
  launcher: "scripts/pod.py"
  pod_naming: "epm-issue-<N>"
  progress_reporting:
    mechanism: scripts/pod_watch.py
    appends_to: events.jsonl
    epm_markers:
      - "epm:run-launched"
      - "epm:progress"
      - "epm:run-finished"
  lifecycle_commands:
    provision: "uv run python scripts/pod.py provision --issue <N> --intent <intent>"
    terminate: "uv run python scripts/pod.py terminate --issue <N> --yes"
    resume: "uv run python scripts/pod.py resume --issue <N>"
  auto_terminate_on_upload_verify_pass: true

# ──────────────────────────────────────────────────────────────────────
# Forbidden control-plane surfaces. Local-files substrate is canonical;
# anything in this list is historical evidence only.
# ──────────────────────────────────────────────────────────────────────
forbidden_workflow_state:
  - github_issues
  - github_labels
  - github_issue_comments
  - github_project_board_columns
  - sagan_postgres_writes
  - parallel_local_state_files_outside_tasks_directory

# ──────────────────────────────────────────────────────────────────────
# Client config. The single writer + verifier.
# ──────────────────────────────────────────────────────────────────────
client:
  script: scripts/task.py
  module: research_workflow.task_workflow
  auth: "none (local filesystem; flock on ~/.task-workflow/lock)"
  mutation_rule: "scripts/task.py only; one git commit per operation; web app only appends to comments.jsonl"
  verification: "scripts/verify_task_body.py (2-content-section nested-design (v2) markdown clean-result spec — 2026-W22, task #454; CHECKS contains 19 body-only functions including the nested-design (v2) sentinel-gated `check_tldr_nested_structure`, PLUS `check_concerns_audit` (Lens 14, binding-concerns; composed 2026-05-31 by task #455) dispatched separately in verify_text since it needs the sibling concerns.jsonl)"

# ──────────────────────────────────────────────────────────────────────
# Workflow-fix-on-bug protocol. Every agent (subagent or orchestrator)
# surfaces workflow-fixable bugs via an inline `<!-- workflow-fix-candidate
# v1 -->` block in its return text; the orchestrator spawns
# workflow-improver in background (isolation=worktree). Full prose
# protocol + scoping rules: .claude/rules/workflow-fix-on-bug.md.
# Critical-rules summary: CLAUDE.md § Critical Rules.
# ──────────────────────────────────────────────────────────────────────
workflow_fix_on_bug:
  enabled: true
  protocol_doc: ".claude/rules/workflow-fix-on-bug.md"
  candidate_marker_open: "<!-- workflow-fix-candidate v1 -->"
  candidate_marker_close: "<!-- /workflow-fix-candidate -->"
  required_candidate_fields:
    - target_file
    - bug_observed
    - why_workflow_gap
    - proposed_change
    - diff_sketch
    - confidence  # low | medium | high
    - related_task
  max_candidates_per_agent_invocation: 1
  spawned_by: orchestrator-only  # subagents NEVER spawn workflow-improver themselves
  applies_to_workflow_surface:
    - ".claude/agents/*.md"
    - ".claude/skills/**/SKILL.md"
    - ".claude/rules/*.md"
    - ".claude/workflow.yaml"
    - ".claude/settings.json"
    - ".claude/settings.local.json"
    # Persistent agent memories steer workflow-agent behavior like agent specs
    # do; corrections / retirements of stale guidance are workflow-surface fixes
    # (the owning agent remains the primary author of its own memory).
    - ".claude/agent-memory/**/*.md"
    - "CLAUDE.md"
    - "scripts/task.py"
    # The task-workflow API library lives under src/, not scripts/ — these two
    # modules are workflow surface despite the general src/** out-of-scope rule.
    - "src/research_workflow/task_workflow.py"
    - "src/research_workflow/task_workflow_migrate.py"
    # The unified backend router (CLAUDE.md § Compute backends): the lane
    # implementations driven by the dispatch_issue.py / backend_poll.py pair
    # below — workflow surface despite the general src/** exclusion. Added
    # 2026-06-11 (#608): the GCP sentinel-drain fix had already landed in
    # gcp.py as a workflow-fix while the list still omitted the package, and
    # the omission nearly deflected the SLURM-lane follow-up.
    - "src/research_workflow/backends/*.py"
    - "scripts/pod.py"
    - "scripts/pod_lifecycle.py"
    - "scripts/pod_config.py"
    - "scripts/pod_audit.py"
    - "scripts/gpu_heuristics.py"
    - "scripts/cleanup_pod.py"
    - "scripts/pod_disk_guard.py"
    - "scripts/runpod_api.py"
    - "scripts/bootstrap_pod.sh"
    - "scripts/cron_pod_audit.sh"
    - "scripts/sync_pods.sh"
    - "scripts/_pods_conf_path.sh"
    - "scripts/pods.conf"
    - "scripts/pods_ephemeral.json"
    - "scripts/workflow_lint.py"
    - "scripts/verify_task_body.py"
    # The upload-verifier's artifact checklist + phantom-URL gate
    # (--claimed-urls-file, /issue Step 8). Added 2026-06-10 (#541): the
    # list predated the phantom-URL gate and its absence nearly deflected
    # an in-scope URL-extractor fix.
    - "scripts/verify_uploads.py"
    - "scripts/audit_clean_results_body_discipline.py"
    # The gist-publish PII redactor (daily/weekly update skills; also the
    # documented remediation path of the pre-commit secret-shaped-string
    # gate) + that gate itself. Added 2026-06-11 (#542): the list predated
    # both and the omission nearly deflected an in-scope fix for the
    # stale-registry IP-redaction gap (redact_for_gist tests red on main).
    - "scripts/redact_for_gist.py"
    - "scripts/check_no_secret_shaped_strings.py"
    # The analyzer Step 1.5 exemplar loader + the sagan_state-compat shim it
    # reads the task workflow through. Added 2026-06-11 (#608): the list
    # predated the task-workflow rewire of these helpers and the omission
    # nearly deflected an in-scope v2-clean-result extraction fix.
    - "scripts/recent_clean_results.py"
    - "scripts/task_state.py"
    # The /issue per-EXIT-site epm:step-completed marker poster (invoked
    # throughout .claude/skills/issue/SKILL.md; read by the §5 re-entry
    # router + autonomous_session_watch.py). Added 2026-06-11 (#608): the
    # third live task_state consumer was still absent from the scope lists —
    # same stale-list class as the two entries above.
    - "scripts/post_step_completed.py"
    - "scripts/codex_task.py"
    - "scripts/poll_pipeline.py"
    # The /issue Step 6b/8 dispatch CLI + Step 6d.2 backend-agnostic bg-Bash
    # poller (router slice 6 pair: dispatch_issue.py writes the per-issue
    # handle sidecar, backend_poll.py reads it each tick). Added 2026-06-11
    # (#571): the list predated the pair and its absence nearly deflected an
    # in-scope sys.path-bootstrap fix for the documented poller invocation.
    - "scripts/dispatch_issue.py"
    - "scripts/backend_poll.py"
    # The /issue Step 7 infra-vs-code failure router (mirrored by
    # .claude/skills/issue/failure_patterns.md). Added 2026-06-10 (#557):
    # the list predated the script and its absence nearly deflected an
    # in-scope OOM-classification fix.
    - "scripts/failure_classifier.py"
    - "scripts/gh_project.py"
    # The PM session's one-pass read-only queue-report helper (research-pm.md
    # Mode 1 STATUS source; pm/SKILL.md boot-scan step 2). Added 2026-06-11.
    - "scripts/pm_queue_report.py"
    - "scripts/spawn_session.py"
    - "scripts/pod_watch.py"
    - "scripts/worktree_audit.py"
    - "scripts/cron_worktree_audit.sh"
    # The /issue Step 4a cone-mode sparse-worktree creation helper (+ its
    # test file below). Added 2026-06-11 (#596): the list predated the
    # helper's same-day merge and its absence nearly deflected an in-scope
    # anchoring/validation hardening fix.
    - "scripts/new_worktree.sh"
    - "scripts/autonomous_session_watch.py"
    - "scripts/cron_autonomous_session_watch.sh"
    - "scripts/session_progress_report.py"
    - "scripts/session_summarize.py"
    - "scripts/session_resolver.py"
    - "scripts/cron_session_summarize.sh"
    - "tests/test_workflow*.py"
    - "tests/test_task_workflow*.py"
    - "tests/test_failure_classifier.py"
    - "tests/test_no_pod_side_task_py_shellout.py"
    - "tests/test_subprocess_env_explicit.py"
    - "tests/test_autonomous_session_watch.py"
    - "tests/test_stalled_detector_and_gc.py"
    - "tests/test_session_progress_report.py"
    - "tests/test_session_summarize.py"
    - "tests/test_session_resolver.py"
    - "tests/test_spawn_session_list_enrichment.py"
    - "tests/test_sparse_worktree.py"
    # Pins the analyzer Step 1.5 exemplar loader's v2-body extraction (#608).
    - "tests/test_recent_clean_results.py"
    # Pin the gist-redaction + pre-commit secret-gate contracts (#542).
    - "tests/test_redact_for_gist.py"
    - "tests/test_check_no_secret_shaped_strings.py"
    # Backend-router invariant tests (pair with the backends/*.py entry above).
    - "tests/test_router*.py"
    - "tests/test_backend_*.py"
    - "tests/test_slurm_*.py"
    - "tests/test_gcp_backend.py"
  out_of_scope:
    - "src/research_workflow/**"
    - "configs/**"
    - "scripts/train.py"
    - "scripts/eval.py"
    - "scripts/run_sweep.py"
    - "scripts/generate_*.py"
    - "scripts/analyze_results.py"
    - "tasks/**"
    - "eval_results/**"
    - "figures/**"
  orchestrator_actions:
    - "Post epm:workflow-fix-candidate v1 to the originating task's events.jsonl (or .claude/cache/workflow-fix-events.jsonl if no task) with candidate fields inline"
    - "Spawn Agent(subagent_type=workflow-improver, run_in_background=true, isolation=worktree) with the verbatim candidate block + task context as prompt"
    - "Continue current work without blocking; the workflow-improver runs in parallel"
    - "On notification (workflow-improver exit), post epm:workflow-fix-applied v1 with full unified diff inline OR epm:workflow-fix-failed v1 with failure_reason"
  suppress_spawn_when:
    - "confidence: low AND proposed_change is speculative (still log the candidate marker)"
    - "Another workflow-improver is already running on the same target_file in this session (queue via SendMessage to the running agent instead of spawning a new one)"
    - "Candidate's target_file is in out_of_scope (log marker; flag emitting agent's misclassification in the marker body)"
    - "proposed_change requires a fundamental architectural decision (rename a status enum, remove the Codex ensemble, change the gate enum) — log the candidate and surface to user on next chat turn instead"
  ensemble_review:
    pairs_with: code-reviewer
    when: "workflow-improver classifies the change as substantive or architectural (NOT for surgical changes — ≤10 lines, single file, no behavior change)"
    cap_rounds: 3  # same as /issue Step 5
  forbidden_emitters:
    - codex-code-reviewer  # Codex twins exit cleanly; verdict body only
    - codex-critic
    - codex-interpretation-critic
    - codex-clean-result-critic
  forbidden_during:
    - "AUTO_REVIEW_DISABLED=1 sentinel present in agent prompt (nested review/diagnostic loop)"
